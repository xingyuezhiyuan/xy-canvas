    <style>
        :root {
            --accent: #0891B2;
            --accent-glow: #06B6D4;
            --fluid-ease: cubic-bezier(0.3, 0, 0, 1);
            --bg: #E2F2F5;
            --sidebar-bg: #D4ECF2;
            --stage-bg: #ECFEFF;
            --border: #B0D4E0;
            --stage-border: #C0DCE8;
            --text: #0F172A;
            --muted: #475569;
            --nav-hover-bg: rgba(8, 145, 178, 0.08);
            --monitor-bg: rgba(8, 145, 178, 0.1);
            --monitor-border: rgba(8, 145, 178, 0.3);
            --monitor-shadow: rgba(8, 145, 178, 0.15);
            --divider: rgba(8, 145, 178, 0.15);
            --scrollbar: #88B8D0;
            --scrollbar-hover: #68A0C0;
            --author-name: #0F172A;
            --social-icon: #475569;
        }

        body.theme-dark {
            --accent: #00f0ff;
            --accent-glow: #00b4d8;
            --bg: #0a0e17;
            --sidebar-bg: #0d1520;
            --stage-bg: #080c14;
            --border: #1a2a3a;
            --stage-border: #1a2a3a;
            --text: #e0e7ef;
            --muted: #6a8fa8;
            --nav-hover-bg: rgba(0, 240, 255, 0.08);
            --monitor-bg: rgba(0, 240, 255, 0.08);
            --monitor-border: rgba(0, 240, 255, 0.25);
            --monitor-shadow: rgba(0, 240, 255, 0.15);
            --divider: rgba(0, 240, 255, 0.12);
            --scrollbar: #1a3050;
            --scrollbar-hover: #2a4a6a;
            --author-name: #00f0ff;
            --social-icon: #6a8fa8;
        }

        /* 极简滚动条 */
        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
            background: transparent !important;
        }

        *::-webkit-scrollbar-track {
            background: transparent !important;
            border: none !important;
        }

        *::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar) !important;
            border: 3px solid transparent !important;
            border-right-width: 5px !important;
            background-clip: padding-box !important;
            border-radius: 10px !important;
        }

        *::-webkit-scrollbar-thumb:hover {
            background-color: var(--scrollbar-hover) !important;
        }

        *::-webkit-scrollbar-corner {
            background: transparent !important;
        }

        * {
            scrollbar-width: thin !important;
            scrollbar-color: var(--scrollbar) transparent !important;
        }

        body {
            background: var(--bg);
            font-family: "Inter", -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            height: 100vh;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        .app-shell {
            display: flex;
            width: 100%;
            height: 100vh;
            background: var(--bg);
            position: relative;
            transition: background 0.3s;
        }

        /* 侧边栏 */
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border);
            padding: 40px 0;
            transition: background 0.3s, border-color 0.3s;
            z-index: 50;
            position: relative;
        }

        body.theme-dark .sidebar {
            border-right-color: rgba(0, 240, 255, 0.1);
            box-shadow: inset -1px 0 0 rgba(0, 240, 255, 0.05);
        }

        .logo-ring {
            width: 36px;
            height: 36px;
            border: 2px solid var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s, border-color 0.3s;
        }

        body.theme-dark .logo-ring {
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.3), inset 0 0 8px rgba(0, 240, 255, 0.1);
        }

        /* 导航项 */
        .nav-item {
            position: relative;
            width: 190px;
            height: 48px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--muted);
            overflow: hidden;
            padding-left: 14px;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--nav-hover-bg);
            color: var(--accent);
            border-color: rgba(8, 145, 178, 0.15);
        }

        body.theme-dark .nav-item:hover {
            border-color: rgba(0, 240, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.05);
        }

        .nav-item.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 20px rgba(8, 145, 178, 0.3);
        }

        body.theme-dark .nav-item.active {
            background: rgba(0, 240, 255, 0.12);
            color: #00f0ff;
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), inset 0 0 15px rgba(0, 240, 255, 0.05);
        }

        /* --- Collapsible Submenu Styles --- */

        .nav-parent {
            position: relative;
            cursor: pointer;
        }

        .nav-arrow {
            transition: transform 0.25s ease;
        }

        .nav-parent .nav-arrow {
            transform: rotate(-90deg);
        }

        .nav-parent.expanded .nav-arrow {
            transform: rotate(0deg);
        }

        /* Downward submenu within sidebar */
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .submenu.expanded {
            max-height: 500px;
        }

        .nav-child {
            width: 190px;
            height: 40px;
            margin: 2px 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--muted);
            padding-left: 44px;
            border: 1px solid transparent;
            font-size: 11px;
            opacity: 0.7;
        }

        .nav-child:hover {
            opacity: 1;
            background: var(--nav-hover-bg);
            color: var(--accent);
            border-color: rgba(8, 145, 178, 0.15);
        }

        body.theme-dark .nav-child:hover {
            border-color: rgba(0, 240, 255, 0.12);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.05);
        }

        .nav-child.submenu-active {
            opacity: 1;
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 20px rgba(8, 145, 178, 0.3);
            border-color: transparent;
        }

        body.theme-dark .nav-child.submenu-active {
            background: rgba(0, 240, 255, 0.12);
            color: #00f0ff;
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), inset 0 0 15px rgba(0, 240, 255, 0.05);
        }

        .nav-parent.has-active-child {
            background: rgba(8, 145, 178, 0.08);
            border-left: 3px solid var(--accent);
            padding-left: 13px;
        }

        body.theme-dark .nav-parent.has-active-child {
            background: rgba(0, 240, 255, 0.06);
            border-left: 3px solid #00f0ff;
        }

        /* Stage base style */
        .stage {
            flex: 1;
            background: var(--stage-bg);
            margin: 16px;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid var(--stage-border);
            position: relative;
            transition: background 0.3s, border-color 0.3s;
        }

        .nav-text {
            opacity: 1;
            margin-left: 16px;
            font-weight: 600;
            font-size: 12px;
            white-space: nowrap;
            transition: opacity 0.3s;
        }

        /* 导航图标固定尺寸 - 覆盖所有可能的样式 */
        .nav-item svg,
        .nav-item .icon-svg {
            width: 20px !important;
            height: 20px !important;
            min-width: 20px !important;
            min-height: 20px !important;
            max-width: 20px !important;
            max-height: 20px !important;
            flex-shrink: 0;
            display: inline-block;
        }

        .nav-arrow {
            width: 16px !important;
            height: 16px !important;
            min-width: 16px !important;
            min-height: 16px !important;
            max-width: 16px !important;
            max-height: 16px !important;
            flex-shrink: 0;
            display: inline-block;
        }

        /* 重置所有 SVG 的默认尺寸 */
        svg:not([width]):not([height]) {
            width: auto;
            height: auto;
        }

        .nav-item svg:not([width]):not([height]),
        .nav-arrow svg:not([width]):not([height]) {
            width: inherit !important;
            height: inherit !important;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.02);
            filter: blur(4px);
            transition: all 0.5s var(--fluid-ease);
            pointer-events: none;
        }

        iframe.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
        }

        /* 右下角监视器 */
        .nano-monitor {
            position: absolute;
            bottom: 24px;
            right: 220px;
            left: auto;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--monitor-bg);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid var(--monitor-border);
            box-shadow: 0 4px 20px var(--monitor-shadow);
            font-family: monospace;
            transition: all 0.4s var(--fluid-ease);
        }

        body.theme-dark .nano-monitor {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1), 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .nano-monitor.is-busy {
            background: var(--monitor-bg);
            color: var(--accent);
            border-color: var(--accent-glow);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
        }

        .nano-monitor.is-busy .stat-group {
            color: #fff;
        }

        .divider {
            width: 1px;
            height: 12px;
            background: var(--divider);
        }

        .is-busy .divider {
            background: rgba(255, 255, 255, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
        }

        body.theme-dark .pulse-dot {
            background: #00f0ff;
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
            animation: neonPulse 2s ease-in-out infinite;
        }

        @keyframes neonPulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(0, 240, 255, 0.6); }
            50% { opacity: 0.6; box-shadow: 0 0 4px rgba(0, 240, 255, 0.3); }
        }

        .spinner-nano {
            width: 10px;
            height: 10px;
            border: 2px solid rgba(0, 240, 255, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .is-busy .spinner-nano { display: block; }
        .is-busy .pulse-dot { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .label-nano {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.5;
            font-size: 9px;
        }

        body.theme-dark .stage::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 240, 255, 0.015) 2px,
                rgba(0, 240, 255, 0.015) 4px
            );
            pointer-events: none;
            z-index: 1;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* 作者组件 */
        .author-box {
            width: 100%;
            height: 60px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .dx-letter {
            position: absolute;
            font-size: 14px;
            font-weight: 800;
            color: var(--text);
            transition: all 0.5s var(--fluid-ease) 0.4s;
            z-index: 10;
        }

        .letter-d { transform: translateX(-8px); }
        .letter-x { transform: translateX(8px); }

        .sidebar:hover .letter-d {
            transform: translateX(-120px);
            opacity: 0;
            transition-delay: 0s;
        }

        .sidebar:hover .letter-x {
            transform: translateX(120px);
            opacity: 0;
            transition-delay: 0s;
        }

        .author-content-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.4s var(--fluid-ease) 0s;
            pointer-events: none;
        }

        .sidebar:hover .author-content-wrap {
            opacity: 1;
            transform: scale(1);
            transition-delay: 0.2s;
            pointer-events: auto;
        }

        .author-name-lite {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--author-name);
        }

        .social-row-lite { display: flex; gap: 12px; }

        .social-icon-lite {
            color: var(--social-icon);
            transition: color 0.2s, transform 0.2s;
        }

        .social-icon-lite:hover {
            color: var(--text);
            transform: translateY(-1px);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            margin: 8px 0;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: var(--nav-hover-bg);
            color: var(--accent);
            border-color: var(--accent);
        }

        body.theme-dark .theme-toggle:hover {
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
        }

        .theme-toggle svg { width: 16px; height: 16px; }
    </style>

</head>

                </div>
            </div>
        </main>
    </div>

    <script src="/static/modules/settings.js?v=20260525012"></script>
    <script>
        if (!AuthManager.isLoggedIn()) {
            window.location.replace('/static/login.html');
        }

        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) { }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        const CID = localStorage.getItem("client_id") || generateUUID();
        localStorage.setItem("client_id", CID);

        function switchUI(el, id, parentId) {
            // Clear all nav item active states
            document.querySelectorAll('.nav-item').forEach(n => {
                n.classList.remove('active', 'submenu-active', 'has-active-child');
            });
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));

            // If this is a child item (has parentId)
            if (parentId) {
                el.classList.add('submenu-active');
                // Collapse submenu after selecting a child
                const submenu = document.querySelector('.submenu');
                if (submenu) {
                    submenu.classList.remove('expanded');
                }
                const parent = document.getElementById('nav-comfy');
                if (parent) {
                    parent.classList.remove('expanded', 'has-active-child', 'active');
                    parent.classList.add('collapsed');
                }
            } else {
                // Top-level nav item
                el.classList.add('active');
                // Collapse any open submenus when switching to a top-level item
                document.querySelectorAll('.nav-parent.expanded').forEach(p => {
                    p.classList.remove('expanded');
                    p.classList.add('collapsed');
                    p.classList.remove('has-active-child');
                    const sub = p.nextElementSibling;
                    if (sub && sub.classList.contains('submenu')) {
                        sub.classList.remove('expanded');
                    }
                });
            }

            // Load the iframe
            const target = document.getElementById('frame-' + id);
            target.classList.add('active');
            if (!target.src) target.src = target.dataset.src;
            // sync theme and auth to newly activated iframe
            syncThemeToFrame(target);
            syncAuthToFrame(target);

            // Save selection to localStorage
            localStorage.setItem('lastSelectedApp', JSON.stringify({ id, parentId }));
        }

        function toggleSubmenu(el) {
            const submenu = el.nextElementSibling;
            if (!submenu || !submenu.classList.contains('submenu')) return;

            const isExpanded = submenu.classList.contains('expanded');

            if (isExpanded) {
                submenu.classList.remove('expanded');
                el.classList.add('collapsed');
                el.classList.remove('expanded');
            } else {
                submenu.classList.add('expanded');
                el.classList.add('expanded');
                el.classList.remove('collapsed');
            }
        }

        async function syncStatus() {
            try {
                const res = await fetch(`/api/queue_status?client_id=${CID}`);
                const data = await res.json();
                const monitor = document.getElementById('nano-monitor');
                const queueVal = document.getElementById('queue-val');
                const logoDot = document.getElementById('logo-dot');
                const total = data.total || 0;
                const pos = data.position || 0;
                if (pos > 0) {
                    monitor.classList.add('is-busy');
                    queueVal.innerText = `${pos}/${total}`;
                    logoDot.style.backgroundColor = '#3b82f6';
                } else {
                    monitor.classList.remove('is-busy');
                    queueVal.innerText = total > 0 ? total : '0';
                    logoDot.style.backgroundColor = 'var(--text)';
                }
            } catch (e) { }
        }

        const host = window.location.host;
        if (host) {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${host}/ws/stats?client_id=${CID}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'stats') {
                    document.getElementById('online-val').innerText = data.online_count;
                } else if (data.type === 'cloud_status') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                }
            };
            setInterval(syncStatus, 2000);
        }

        // --- 夜间模式 ---

        function syncThemeToFrame(iframe) {
            const theme = (window.StudioTheme || {get: () => 'dark'}).get();
            try {
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'studio-theme', theme }, '*');
                }
            } catch (e) {}
        }

        function syncAuthToFrame(iframe) {
            const token = AuthManager.getAuthToken();
            try {
                if (iframe && iframe.contentWindow && token) {
                    iframe.contentWindow.postMessage({ type: 'auth-token', token }, '*');
                }
            } catch (e) {}
        }

        function broadcastTheme(theme) {
            if (window.StudioTheme) {
                window.StudioTheme.set(theme);
            }
            document.querySelectorAll('iframe').forEach(f => syncThemeToFrame(f));
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const moon = document.getElementById('icon-moon');
            const sun = document.getElementById('icon-sun');
            if (!moon || !sun) return;
            if (theme === 'dark') {
                moon.style.display = 'none';
                sun.style.display = 'block';
            } else {
                moon.style.display = 'block';
                sun.style.display = 'none';
            }
        }

        function toggleTheme() {
            const current = window.StudioTheme ? window.StudioTheme.get() : 'dark';
            broadcastTheme(current === 'dark' ? 'light' : 'dark');
        }

        // listen for theme changes triggered by theme.js
        window.addEventListener('studio-theme-change', (e) => {
            updateThemeIcon(e.detail.theme);
        });

        // init icon state on load
        window.addEventListener('DOMContentLoaded', () => {
            const theme = window.StudioTheme ? window.StudioTheme.get() : 'dark';
            updateThemeIcon(theme);

            // Restore last selected app
            const saved = localStorage.getItem('lastSelectedApp');
            if (saved) {
                try {
                    const { id, parentId } = JSON.parse(saved);
                    if (id) {
                        // If it was a comfyui child item
                        if (parentId === 'comfy') {
                            const parent = document.getElementById('nav-comfy');
                            const submenu = document.querySelector('.submenu');
                            if (parent) {
                                parent.classList.add('expanded', 'has-active-child');
                                parent.classList.remove('collapsed');
                            }
                            if (submenu) {
                                submenu.classList.add('expanded');
                            }
                            // Find and activate the child nav item
                            const childNav = document.querySelector(`.nav-child[onclick*="'${id}'"]`);
                            if (childNav) {
                                childNav.classList.add('submenu-active');
                            }
                        } else {
                            // Top-level nav item
                            const topNav = document.querySelector(`.nav-item[onclick*="'${id}'"]`);
                            if (topNav) {
                                topNav.classList.add('active');
                            }
                        }
                        // Activate the iframe
                        const target = document.getElementById('frame-' + id);
                        if (target) {
                            target.classList.add('active');
                            if (!target.src) target.src = target.dataset.src;
                            syncThemeToFrame(target);
                        }
                    }
                } catch (e) {
                    console.error('Failed to restore last selected app:', e);
                }
            }
        });

        // sync theme and auth when iframe loads
        document.querySelectorAll('iframe').forEach(f => {
            f.addEventListener('load', () => {
                syncThemeToFrame(f);
                syncAuthToFrame(f);
            });
        });
    </script>
</body>

</html>
