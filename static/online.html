    <style>

        .size-row { display:flex; align-items:center; gap:8px; }

        .ratio-option { height:30px; border-radius:999px; display:flex; align-items:center; justify-content:center; gap:4px; color:#64748b; font-size:10px; font-weight:600; letter-spacing:0; transition:all .25s var(--easing); }

        .resolution-option.active { background:#fff; color:#111827; box-shadow:0 1px 3px rgba(15,23,42,.08); }

        @media (max-width:640px){ .size-row{ align-items:stretch; flex-direction:column; } .ratio-grid{ grid-template-columns:repeat(2,1fr); border-radius:18px; } .resolution-toggle{ align-self:flex-start; } }

        .batch-option { height:30px; min-width:36px; border-radius:999px; display:flex; align-items:center; justify-content:center; color:#64748b; font-size:10px; font-weight:600; transition:all .25s var(--easing); cursor:pointer; border:none; background:transparent; }
        .batch-option.active { background:#00b4d8; color:#fff; box-shadow:0 1px 3px rgba(0,180,216,.25); }
        .theme-dark .batch-pill { background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.1); }

        .gallery-lightbox:hover #lightboxNextBtn:not([style*="display: none"]) { opacity: 1 !important; pointer-events: auto !important; }

        .pyramid-loader { position:relative; width:160px; height:160px; display:inline-block; transform-style:preserve-3d; transform:rotateX(-20deg); }
        .pyramid-wrapper { position:relative; width:100%; height:100%; transform-style:preserve-3d; animation:pyramid-spin 4s linear infinite; }
        @keyframes pyramid-spin { 100% { transform:rotateY(360deg); } }
        .pyramid-loader .pyramid-wrapper .side { width:80px; height:80px; position:absolute; top:0; left:0; right:0; bottom:0; margin:auto; transform-origin:center top; clip-path:polygon(50% 0%, 0% 100%, 100% 100%); }
        .pyramid-loader .pyramid-wrapper .side1 { transform:rotateZ(-30deg) rotateY(90deg); background:conic-gradient(#2BDEAC, #F028FD, #D8CCE6, #2F2585); }
        .pyramid-loader .pyramid-wrapper .side2 { transform:rotateZ(30deg) rotateY(90deg); background:conic-gradient(#2F2585, #D8CCE6, #F028FD, #2BDEAC); }
        .pyramid-loader .pyramid-wrapper .side3 { transform:rotateX(30deg); background:conic-gradient(#2F2585, #D8CCE6, #F028FD, #2BDEAC); }
        .pyramid-loader .pyramid-wrapper .side4 { transform:rotateX(-30deg); background:conic-gradient(#2BDEAC, #F028FD, #D8CCE6, #2F2585); }
        .pyramid-loader .pyramid-wrapper .shadow { width:70px; height:70px; background:#8B5AD5; position:absolute; top:0; left:0; right:0; bottom:0; margin:auto; transform:rotateX(90deg) translateZ(-55px); filter:blur(18px); }
        .pyramid-progress { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; z-index:10; }
        .pyramid-progress-ring { width:130px; height:130px; transform:rotate(-90deg); }
        .pyramid-progress-ring-bg { fill:none; stroke:rgba(255,255,255,.2); stroke-width:4; }
        .pyramid-progress-ring-fill { fill:none; stroke:#00f0ff; stroke-width:4; stroke-linecap:round; stroke-dasharray:226; stroke-dashoffset:226; transition:stroke-dashoffset .3s ease; filter:drop-shadow(0 0 8px rgba(0,240,255,.6)); }
        .pyramid-progress-text { font-size:28px; font-weight:800; color:#00f0ff; text-shadow:0 0 10px rgba(0,240,255,.7); }
        .pyramid-progress-status { margin-top:10px; font-size:10px; font-weight:700; color:#94a3b8; text-align:center; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; letter-spacing:.06em; }

        .card-pending { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; background:#fff; height:100%; }
        .theme-dark .card-pending { background:#111d2a; }
        .theme-dark .delete-confirm { background:rgba(17,29,42,.97) !important; }

        .theme-dark .delete-confirm .confirm-no:hover { background:rgba(255,255,255,.18) !important; }

        .card-pending .mini-pyramid .pw { position:relative; width:100%; height:100%; transform-style:preserve-3d; animation:pyramid-spin 4s linear infinite; }
        .card-pending .mini-pyramid .pw .sd { width:80px; height:80px; position:absolute; top:0; left:0; right:0; bottom:0; margin:auto; transform-origin:center top; clip-path:polygon(50% 0%, 0% 100%, 100% 100%); }
        .card-pending .mini-pyramid .pw .sd1 { transform:rotateZ(-30deg) rotateY(90deg); background:conic-gradient(#2BDEAC, #F028FD, #D8CCE6, #2F2585); }
        .card-pending .mini-pyramid .pw .sd2 { transform:rotateZ(30deg) rotateY(90deg); background:conic-gradient(#2F2585, #D8CCE6, #F028FD, #2BDEAC); }
        .card-pending .mini-pyramid .pw .sd3 { transform:rotateX(30deg); background:conic-gradient(#2F2585, #D8CCE6, #F028FD, #2BDEAC); }
        .card-pending .mini-pyramid .pw .sd4 { transform:rotateX(-30deg); background:conic-gradient(#2BDEAC, #F028FD, #D8CCE6, #2F2585); }
        .card-pending .mini-pyramid .pw .sdw { width:60px; height:60px; background:#8B5AD5; position:absolute; top:0; left:0; right:0; bottom:0; margin:auto; transform:rotateX(90deg) translateZ(-50px); filter:blur(12px); }
        .card-pending .pct-text { font-size:13px; font-weight:800; color:#00b4d8; letter-spacing:.02em; }
        .card-pending .pct-label { font-size:8px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:.1em; }

        .loader-overlay { position:absolute; inset:0; background:rgba(15,23,42,.85); backdrop-filter:blur(4px); flex-direction:column; align-items:center; justify-content:center; border-radius:32px; z-index:5; }

        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        .asset-picker-overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
        .asset-picker-overlay.open { display:flex; }
        .asset-picker-panel { background:#fff; border-radius:24px; width:520px; max-width:90vw; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 25px 60px rgba(0,0,0,.2); }

        .preset-close:hover { background:rgba(0,240,255,.1); color:#22d3ee; border-color:rgba(0,240,255,.3); box-shadow:0 0 12px rgba(0,240,255,.3); }

        .preset-category-title span:first-child { font-size:14px; filter:drop-shadow(0 0 6px rgba(0,240,255,.5)); }
        .preset-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr)); gap:8px; }
        .preset-btn { padding:10px 8px; border-radius:10px; font-size:11px; font-weight:600; text-align:center; background:rgba(0,0,0,.3); border:1px solid rgba(0,240,255,.15); color:#cbd5e1; cursor:pointer; transition:all .25s; position:relative; }

<body>
    <div class="container-box min-h-screen flex flex-col">
        <header class="flex justify-between items-end mb-16">
            <div class="space-y-1">
                <h1 class="text-4xl font-extrabold tracking-tighter italic">在线生图</h1>
                <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-gray-400">GPT / NANO BANANA IMAGE STUDIO</p>
            </div>
            <nav class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-widest text-gray-400">
                <span class="text-black border-b-2 border-black pb-1">Create</span>

        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-12">

                    <div class="flex items-center gap-2 text-gray-400">

                            ✦
                        </button>
                    </div>
                    <textarea id="promptInput" rows="5" class="nano-input w-full p-6 rounded-3xl text-sm outline-none resize-none placeholder-gray-300" placeholder="输入想生成或编辑的画面..."></textarea>
                </section>

                <section class="space-y-4">
                    <div class="flex items-center gap-2 text-gray-400">
                        <i data-lucide="images" class="w-3.5 h-3.5"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Reference Images</span>

                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="transition-all duration-300 group-hover:stroke-amber-500"><path d="M12 10v6"/><path d="M9 13h6"/><path d="M22 20v-8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2a2 2 0 0 0-1.66-.9H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2Z"/></svg>
                        </button>
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        <div id="drop-zone-1" tabindex="0" onclick="document.getElementById('file1').click()" class="upload-item group aspect-square rounded-2xl flex flex-col items-center justify-center cursor-pointer">
                            <input type="file" id="file1" accept="image/*" class="hidden" onchange="handleFile(this.files[0],1)">

                                <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                                <span class="text-[10px] font-medium text-gray-400">点击或拖拽</span>
                                <span class="text-[8px] text-gray-300">支持 Ctrl+V 粘贴</span>

                            </div>
                            <img id="prev1" class="preview-img hidden"><button id="del1" onclick="clearSlot(1,event)" class="hidden absolute top-2 right-2 w-6 h-6 bg-white/90 rounded-full shadow-sm z-10">×</button><button id="edit1" onclick="handleEdit(1,event)" class="hidden absolute top-2 right-10 w-6 h-6 bg-white/90 rounded-full shadow-sm z-10 text-[10px] font-bold">✎</button>
                        </div>
                        <div id="drop-zone-2" tabindex="0" onclick="document.getElementById('file2').click()" class="upload-item group aspect-square rounded-2xl flex flex-col items-center justify-center cursor-pointer">
                            <input type="file" id="file2" accept="image/*" class="hidden" onchange="handleFile(this.files[0],2)">
                            <div class="upload-content">
                                <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                                <span class="text-[10px] font-medium text-gray-400">点击或拖拽</span>
                                <span class="text-[8px] text-gray-300">支持 Ctrl+V 粘贴</span>
                                <span class="text-[9px] mt-1 font-bold text-gray-400 uppercase">Aux A</span>
                            </div>
                            <img id="prev2" class="preview-img hidden"><button id="del2" onclick="clearSlot(2,event)" class="hidden absolute top-2 right-2 w-6 h-6 bg-white/90 rounded-full shadow-sm z-10">×</button><button id="edit2" onclick="handleEdit(2,event)" class="hidden absolute top-2 right-10 w-6 h-6 bg-white/90 rounded-full shadow-sm z-10 text-[10px] font-bold">✎</button>

                    <span class="tracking-[0.3em] text-[11px] uppercase">Generate</span>

            <div class="lg:col-span-7">
                <div id="resultBox" class="result-frame min-h-[500px] lg:h-full flex items-center justify-center relative overflow-hidden">
                    <div id="placeholder" class="text-center space-y-4 opacity-20"><i data-lucide="layout" class="w-12 h-12 mx-auto stroke-[1px]"></i><p class="text-[10px] font-black tracking-[0.5em] uppercase">Canvas Ready</p></div>
                    <div id="loader" class="hidden loader-overlay">
                        <div class="pyramid-loader">
                            <div class="pyramid-wrapper">

                <button onclick="downloadLightboxImage()" class="absolute top-4 right-4 w-10 h-10 bg-black/50 hover:bg-black text-white rounded-xl flex items-center justify-center shadow-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>

    <script>
        // 自动检测访问来源：localhost/127.0.0.1 使用直连模式，局域网使用代理模式
        const _isLocalAccess = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
        const COMFYUI_CONFIG = {"local_address": "127.0.0.1:8188", "cloud_address": "https://kg03rrnf6rg9bxab-8188.container.x-gpu.com/", "active_server": _isLocalAccess ? "本地服务器" : "云端服务器"};

        let COMFYUI_SERVER = 'http://127.0.0.1:8188';
        let IS_LOCAL_SERVER = _isLocalAccess;
        const CLIENT_ID = localStorage.getItem("client_id") || ('online_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 9));
        if (!localStorage.getItem("client_id")) localStorage.setItem("client_id", CLIENT_ID);

        async function loadConfig() {
            const localConfig = localStorage.getItem('comfyui_config');
            if (localConfig) {
                try {
                    const config = JSON.parse(localConfig);
                    const activeServer = config.active_server || '本地服务器';
                    IS_LOCAL_SERVER = (activeServer === '本地服务器');
                    if (activeServer === '云端服务器' && config.cloud_address) {
                        COMFYUI_SERVER = (config.cloud_address.startsWith('http') ? config.cloud_address : `https://${config.cloud_address}`).replace(/\/+$/, '');
                    } else if (config.local_address) {
                        COMFYUI_SERVER = (config.local_address.startsWith('http') ? config.local_address : `http://${config.local_address}`).replace(/\/+$/, '');
                    }
                    return;
                } catch (e) {
                    console.error('解析本地配置失败:', e);
                }
            }
        }

        lucide.createIcons();
        let refs = {1:null,2:null,3:null};
        let provider = 'nano2';
        let ratio = 'square';
        let resolution = '1k';
        let models = {gpt:'gpt-image-2-c', nano1:'gemini-3-pro-image-preview', nano2:'gemini-3.1-flash-image-preview'};
        function getProtocol(model){
            return model.toLowerCase().includes('gemini') ? 'gemini' : 'openai';
        }
        let allHistory = [], currentIndex = 0, currentResult = null, currentLightboxData = null, isLoading = false;
        let batchCount = 1;
        const PAGE_SIZE = 24;
        const SIZE_OPTIONS = {
            square: [
                ['1024x1024', '1k'],
                ['1536x1536', '2k']
            ],
            portrait: [
                ['720x1080', '1k'],
                ['1024x1536', '2k']
            ],
            landscape: [
                ['1080x720', '1k'],
                ['1536x1024', '2k']
            ],
            story: [
                ['720x1280', '1k'],
                ['1080x1920', '2k']
            ],
            wide: [
                ['1280x720', '1k'],
                ['1920x1080', '2k']
            ]
        };

        async function initModels(){
            try {
                const cfg = await fetch('/api/config').then(r=>r.json());
                const imageModels = cfg.image_models || [];
                models.nano2 = imageModels.find(m => m.toLowerCase().includes('flash')) || imageModels.find(m => m.toLowerCase().includes('gemini')) || 'gemini-3.1-flash-image-preview';
                models.nano1 = imageModels.find(m => m.toLowerCase().includes('pro')) || imageModels.find(m => m.toLowerCase().includes('gemini')) || 'gemini-3-pro-image-preview';
            } catch(e) {}
        }

        function setProvider(next){
            provider = next;
            document.getElementById('gptOpt').classList.toggle('active', next === 'gpt');
            document.getElementById('nano1Opt').classList.toggle('active', next === 'nano1');
            document.getElementById('nano2Opt').classList.toggle('active', next === 'nano2');
        }

        function setBatchCount(next){
            batchCount = next;
            document.querySelectorAll('.batch-option').forEach(btn => btn.classList.toggle('active', parseInt(btn.textContent) === next));
        }

        function setRatio(next, preferredSize = ''){
            ratio = next;
            ['square','portrait','landscape','story','wide'].forEach(item => {
                document.getElementById(`ratio-${item}`).classList.toggle('active', item === next);
            });
            if (preferredSize) {
                const match = SIZE_OPTIONS[next].find(([value]) => value === preferredSize);
                if (match) resolution = match[1];
            }
            updateResolutionUI();
        }

        function setResolution(next){
            resolution = next;
            updateResolutionUI();
        }

        function updateResolutionUI(){
            document.getElementById('res-1k').classList.toggle('active', resolution === '1k');
            document.getElementById('res-2k').classList.toggle('active', resolution === '2k');
        }

        function currentSize(){
            const options = SIZE_OPTIONS[ratio] || SIZE_OPTIONS.square;
            const match = options.find(([, label]) => label === resolution) || options[0];
            return match[0];
        }

        [1,2,3].forEach(id => {
            const zone = document.getElementById(`drop-zone-${id}`);
            zone.ondragover = e => { e.preventDefault(); zone.classList.add('drag-over'); };
            zone.ondragleave = () => zone.classList.remove('drag-over');
            zone.ondrop = e => { e.preventDefault(); zone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0], id); };
            zone.addEventListener('paste', e => {
                e.preventDefault();
                const item = [...(e.clipboardData?.items || [])].find(x => x.kind === 'file' && x.type.startsWith('image/'));
                if (item) handleFile(item.getAsFile(), id);
            });
        });
        window.addEventListener('paste', e => {
            const item = [...(e.clipboardData?.items || [])].find(x => x.kind === 'file' && x.type.startsWith('image/'));
            if (item) handleFile(item.getAsFile(), firstEmptySlot());
        });
        function firstEmptySlot(){ return [1,2,3].find(id => !refs[id]) || 1; }

        async function handleFile(file, index){
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const prev = document.getElementById(`prev${index}`);
                prev.src = e.target.result; prev.classList.remove('hidden');
                document.getElementById(`del${index}`).classList.remove('hidden');
                document.getElementById(`edit${index}`).classList.remove('hidden');
            };
            reader.readAsDataURL(file);
            const form = new FormData();
            form.append('files', file);
            const data = await fetch('/api/ai/upload', {method:'POST', body:form}).then(r=>r.json());
            refs[index] = data.files[0];
        }
        function clearSlot(index, ev){
            if(ev) ev.stopPropagation();
            refs[index] = null;
            document.getElementById(`prev${index}`).src = '';
            document.getElementById(`prev${index}`).classList.add('hidden');
            document.getElementById(`del${index}`).classList.add('hidden');
            document.getElementById(`edit${index}`).classList.add('hidden');
        }
        function handleEdit(index, ev){
            if (ev) { ev.preventDefault(); ev.stopPropagation(); }
            const ref = refs[index];
            if (!ref || !ref.url) return;
            if (typeof ImageEditor === 'undefined') { alert('图像编辑器未加载'); return; }
            ImageEditor.open(ref.url, {
                onSave: function(result) {
                    if (result.url) {
                        refs[index].url = result.url;
                        refs[index].name = result.name || refs[index].name;
                        document.getElementById(`prev${index}`).src = result.url;
                    }
                    if (result.operation === 'outpaint') {
                        document.getElementById('promptInput').value = '扩图';
                    }
                },
                onCancel: function() {}
            });
        }

        async function openAssetPickerForRefs() {
            const overlay = document.getElementById('assetPickerOverlay');
            const content = document.getElementById('assetPickerContent');
            content.innerHTML = '<div class="asset-picker-empty"><span>加载中...</span></div>';
            overlay.classList.add('open');
            lucide.createIcons();
            try {
                const res = await fetch('/api/user/assets');
                if (res.status === 401) { content.innerHTML = '<div class="asset-picker-empty"><span>请先登录后再使用资产库</span></div>'; return; }
                if (!res.ok) throw new Error('获取资产列表失败');
                const data = await res.json();
                const images = data.files || [];
                if (!images.length) {
                    content.innerHTML = '<div class="asset-picker-empty"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 10v6"/><path d="M9 13h6"/><path d="M22 20v-8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2a2 2 0 0 0-1.66-.9H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2Z"/></svg><span>暂无资产图片</span></div>';
                    return;
                }
                content.innerHTML = '<div class="asset-picker-grid">' + images.map(img =>
                    '<div class="asset-picker-item" onclick="applyAssetToRef(\'' + img.url.replace(/'/g, "\\'") + '\',\'' + img.name.replace(/'/g, "\\'") + '\')">' +
                        '<img src="' + img.url + '" alt="' + img.name.replace(/"/g, '&quot;') + '" loading="lazy">' +
                        '<div class="asset-picker-item-name">' + img.name.replace(/</g, '&lt;') + '</div>' +
                    '</div>'
                ).join('') + '</div>';
            } catch (err) {
                content.innerHTML = '<div class="asset-picker-empty"><span>加载失败: ' + err.message + '</span></div>';
            }
        }

        function closeAssetPickerForRefs() {
            document.getElementById('assetPickerOverlay').classList.remove('open');
        }

        function applyAssetToRef(url, name) {
            const index = firstEmptySlot();
            const prev = document.getElementById('prev' + index);
            prev.src = url;
            prev.classList.remove('hidden');
            document.getElementById('del' + index).classList.remove('hidden');
            document.getElementById('edit' + index).classList.remove('hidden');
            refs[index] = { url: url, name: name };
            closeAssetPickerForRefs();
        }

        async function submitImage(){
            const prompt = document.getElementById('promptInput').value.trim();
            if(!prompt){ alert('请输入提示词'); return; }
            const btn = document.getElementById('genBtn'), loader = document.getElementById('loader'), placeholder = document.getElementById('placeholder'), out = document.getElementById('outputImg'), dl = document.getElementById('downloadBtn');
            btn.disabled = true; placeholder.classList.add('hidden'); out.classList.add('hidden'); dl.classList.add('hidden'); loader.classList.remove('hidden'); loader.style.display = 'flex';
            const count = batchCount;
            const batchId = Date.now();
            const masonry = document.getElementById('masonry');
            createPendingCards(batchId, count, masonry);
            startProgressAnimation();
            const refImages = Object.values(refs).filter(Boolean).map(r => ({ url: r.url || '', name: r.name || '' }));
            const body = { prompt, model:models[provider], size:currentSize(), protocol:getProtocol(models[provider]), reference_images: refImages };
            console.log('发送请求体:', JSON.stringify(body, null, 2));
            const requests = Array.from({length:count}, () =>
                fetch('/api/online-image', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)})
                    .then(async r => { if(!r.ok) { const err = await r.json(); console.error('请求失败:', JSON.stringify(err, null, 2)); throw new Error(err.detail || '生成失败'); } return r.json(); })
            );
            try {
                const results = await Promise.allSettled(requests);
                results.forEach((res, i) => {
                    if(res.status === 'fulfilled'){
                        const data = res.value;
                        updatePendingCard(batchId, i, data);
                        if(i === 0){ currentResult = data; out.src = data.images[0]; out.classList.remove('hidden'); dl.classList.remove('hidden'); }
                    } else {
                        failPendingCard(batchId, i);
                    }
                });
                stopProgressAnimation();
            } catch(err) {
                stopProgressAnimation();
            } finally {
                loader.classList.add('hidden'); loader.style.display = ''; btn.disabled = false;
            }
        }

        function createPendingCards(batchId, count, masonry){
            for(let i = 0; i < count; i++){
                const id = `pending-${batchId}-${i}`;
                if(document.getElementById(id)) continue;
                const card = document.createElement('div');
                card.id = id;
                card.className = 'masonry-item';
                card.innerHTML = `<div class="card-pending"><div class="mini-pyramid"><div class="pw"><div class="sd sd1"></div><div class="sd sd2"></div><div class="sd sd3"></div><div class="sd sd4"></div><div class="sdw"></div></div></div><span class="pct-text" id="pct-${id}">0%</span><span class="pct-label">生成中</span></div>`;
                masonry.prepend(card);
                startCardProgress(id);
            }
        }

        const cardTimers = {};

        function startCardProgress(pendingId){
            let pv = 0;
            const el = document.getElementById(`pct-${pendingId}`);
            if(!el) return;
            cardTimers[pendingId] = setInterval(() => {
                if(pv < 95){
                    pv = Math.min(95, pv + (95 - pv) / 20 + 0.3);
                    el.textContent = Math.round(pv) + '%';
                }
            }, 350);
        }

        function stopCardProgress(pendingId){
            if(cardTimers[pendingId]){ clearInterval(cardTimers[pendingId]); delete cardTimers[pendingId]; }
        }

        function updatePendingCard(batchId, index, data){
            const id = `pending-${batchId}-${index}`;
            const card = document.getElementById(id);
            if(!card || !data.images?.[0]) return;
            stopCardProgress(id);
            if(document.getElementById(`history-${data.timestamp}`)){ card.remove(); return; }
            card.id = `history-${data.timestamp}`;

        function startProgressAnimation() {
            stopProgressAnimation();

            const status = document.getElementById('progressStatus');
            const circumference = 226;
            fill.style.strokeDashoffset = circumference;
            text.textContent = '0%';
            status.textContent = '正在请求...';
            progressTimer = setInterval(() => {
                if (progressValue < 95) {
                    progressValue = Math.min(95, progressValue + (95 - progressValue) / 20 + 0.3);
                    const offset = circumference * (1 - progressValue / 100);
                    fill.style.strokeDashoffset = offset;
                    text.textContent = Math.round(progressValue) + '%';
                }
            }, 350);
        }

        function stopProgressAnimation() {
            if (progressTimer) {

                progressTimer = null;
            }

            const text = document.getElementById('progressText');
            const status = document.getElementById('progressStatus');

        async function processRemoveBg(imageUrl, timestamp, ev) {
            ev.stopPropagation();
            if (!window.jiandanBeijing) {

                return;
            }
            const card = document.getElementById(`history-${timestamp}`);

            try {
                const resultUrl = await window.jiandanBeijing.removeBackground(imageUrl);
                const saveRes = await fetch('/api/history/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: '去除背景',
                        images: [resultUrl],
                        type: 'online'
                    })
                });
                const saveData = await saveRes.json();
                if (saveData.success) {
                    const newData = { images: [resultUrl], prompt: '去除背景', timestamp: saveData.timestamp };
                    allHistory.unshift(newData);
                    renderImageCard(newData, true);
                }
            } catch (err) {
                console.error('[去除背景] 失败:', err);
                alert(`去除背景失败: ${err.message}`);
            } finally {
                if (card) card.style.opacity = '';
            }
        }

        }

        function applyThreeViewPrompt() {
            document.getElementById('promptInput').value = '提取图片中的角色，**请参考图中的角色，模仿人物设定图生成一张这个人的人物设定规范图的页面。画面布局:左侧为角色头部大特写(占据画布左半部分)，右侧并列展示角色的正面全身、侧面全身、背面全身三视图(三图紧凑排列在右半部分)，整体画布为横向构图，纯白背景，各视图之间无重叠、边界清晰';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadConfig();
            buildPresetPanel();
        });
    </script>

    <div id="presetPanel" class="preset-overlay">
        <div class="preset-panel">
            <div class="preset-header">
                <div class="preset-title">
                    <span style="font-size:18px;">✦</span>
                    <span>提示词预设</span>
                </div>
                <button onclick="closePresetPanel()" class="preset-close">&times;</button>
            </div>
            <div id="presetBody" class="preset-body"></div>
            <div class="preset-footer">
                <button onclick="clearPresets()" class="preset-clear-btn">清空选择</button>
                <button onclick="applyPresets()" class="preset-apply-btn">应用到 Prompt</button>
            </div>
        </div>
    </div>
</body>
</html>
