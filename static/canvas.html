        <div id="canvasGate" class="canvas-gate">
            <div class="gate-panel">

                        <div class="gate-title-row">
                            <div id="gateTitleText" class="gate-title">选择画布</div>
                            <span id="gateCountPill" class="gate-count-pill">0</span>
                        </div>
                        <div id="gateSubtitle" class="gate-subtitle">打开已有画布，或新建一个开始创作。</div>
                    </div>
                    <div class="gate-head-actions">
                        <button id="gateRefreshBtn" class="gate-icon-btn" type="button" title="刷新列表" aria-label="刷新列表">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        </button>
                        <button id="gateTrashBtn" class="gate-icon-btn gate-trash-entry" type="button" title="打开回收站" aria-label="打开回收站">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                            <span id="gateTrashCount" class="gate-trash-badge">0</span>

                        <button id="gateCreateBtn" class="primary-btn" type="button"><i data-lucide="plus" class="w-4 h-4"></i>新建画布</button>
                    </div>
                </div>

                    <button id="gateCancelBtn" class="create-cancel" type="button" title="取消" aria-label="取消"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>

                <div id="gateCanvasList" class="gate-list"></div>
            </div>

                <button class="menu-btn" onclick="menuAdd('loop')"><i data-lucide="repeat-2" class="w-4 h-4"></i>循环节点</button>

                <button class="menu-btn" onclick="menuAdd('msgen')"><i data-lucide="cloud-lightning" class="w-4 h-4"></i>Modelscope生成</button>
                <button class="menu-btn" onclick="menuAdd('comfy')"><i data-lucide="workflow" class="w-4 h-4"></i>ComfyUI 生成</button>
                <button class="menu-btn" onclick="menuAdd('video')"><i data-lucide="clapperboard" class="w-4 h-4"></i>视频生成</button>
                <button class="menu-btn" onclick="menuAdd('ps')"><i data-lucide="palette" class="w-4 h-4"></i>获取photoshop图像</button>
                <button class="menu-btn" onclick="menuAdd('output')"><i data-lucide="circle-dot" class="w-4 h-4"></i>Output</button>

        <div id="outputLightbox" class="output-lightbox" onclick="window.outputNode.closeLightbox()">

                    <div id="outputCompareOriginalWrap" class="output-compare-original-wrap">

                </div>
            </div>

        <div id="imageEditModal" class="image-edit-modal" onclick="window.imageNodeModule.closeImageEditor()">
            <div class="image-edit-panel" onclick="event.stopPropagation()">
                <div class="image-edit-head">
                    <div>
                        <div class="editor-tabs" style="display:flex;gap:8px;margin-bottom:8px;">
                            <button id="cropTab" class="editor-tab" type="button" onclick="window.imageNodeModule.switchEditorMode('crop')" style="height:32px;border-radius:999px;padding:0 14px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:11px;font-weight:800;background:#f0f9ff;color:#0891b2;border:1px solid #cffafe;cursor:pointer;">裁剪</button>
                            <button id="maskTab" class="editor-tab active" type="button" onclick="window.imageNodeModule.switchEditorMode('mask')" style="height:32px;border-radius:999px;padding:0 14px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:11px;font-weight:800;background:#0891b2;color:#fff;border:none;cursor:pointer;">遮罩</button>
                            <button id="brushTab" class="editor-tab" type="button" onclick="window.imageNodeModule.switchEditorMode('brush')" style="height:32px;border-radius:999px;padding:0 14px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:11px;font-weight:800;background:#f0f9ff;color:#0891b2;border:1px solid #cffafe;cursor:pointer;">画笔</button>
                            <button id="gridTab" class="editor-tab" type="button" onclick="window.imageNodeModule.switchEditorMode('grid')" style="height:32px;border-radius:999px;padding:0 14px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:11px;font-weight:800;background:#f0f9ff;color:#0891b2;border:1px solid #cffafe;cursor:pointer;">宫格</button>
                        </div>
                        <div class="image-edit-title" id="imageEditTitle">遮罩编辑器</div>
                        <div class="image-edit-sub" id="imageEditSub">用画笔绘制遮罩区域,白色为遮罩部分</div>
                    </div>
                    <button class="preview-icon-btn" type="button" onclick="window.imageNodeModule.closeImageEditor()" title="关闭"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div id="imageEditStage" class="image-edit-stage">
                    <div class="image-edit-stage-inner">
                        <div id="cropCanvas" class="crop-canvas">
                            <img id="cropImage" alt="crop source">
                            <canvas id="maskOverlay" style="position:absolute;inset:0;width:100%;height:100%;border-radius:14px;cursor:crosshair;display:none;"></canvas>
                            <canvas id="editDrawCanvas" class="edit-draw-canvas" style="display:none;"></canvas>
                            <div id="cropBox" class="crop-box">
                                <div id="cropHandle" class="crop-handle"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="maskToolbar" class="image-edit-tools" style="display:none;">
                    <label>画笔大小:
                        <input id="brushSizeSlider" type="range" min="5" max="80" value="20" oninput="window.imageNodeModule.updateBrushSize(this.value)">
                        <span id="brushSizeLabel">20px</span>
                    </label>
                    <button id="maskUndoBtn" class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.undoMaskDrawing()" title="撤销" style="opacity:.4" disabled><i data-lucide="undo-2" class="w-4 h-4"></i></button>
                    <button id="maskRedoBtn" class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.redoMaskDrawing()" title="恢复" style="opacity:.4" disabled><i data-lucide="redo-2" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.clearMask()"><i data-lucide="eraser" class="w-4 h-4"></i>清除</button>
                    <button class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.fillMask()"><i data-lucide="square" class="w-4 h-4"></i>全部填充</button>
                </div>
                <div id="brushToolbar" class="image-edit-tools" style="display:none;">
                    <button class="image-edit-btn primary" type="button" data-brush-tool="free" onclick="window.imageNodeModule.setBrushTool('free')" title="自由画笔"><i data-lucide="paintbrush" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" data-brush-tool="rect" onclick="window.imageNodeModule.setBrushTool('rect')" title="矩形"><i data-lucide="square" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" data-brush-tool="ellipse" onclick="window.imageNodeModule.setBrushTool('ellipse')" title="椭圆"><i data-lucide="circle" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" data-brush-tool="mark" onclick="window.imageNodeModule.setBrushTool('mark')" title="标志"><i data-lucide="flag" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" data-brush-tool="label" onclick="window.imageNodeModule.setBrushTool('label')" title="数字标签"><i data-lucide="list-ordered" class="w-4 h-4"></i></button>
                    <label>颜色:
                        <input id="paintBrushColor" type="color" value="#ff2d55" oninput="window.imageNodeModule.updatePaintBrushColor(this.value)">
                    </label>
                    <label>画笔大小:
                        <input id="paintBrushSize" type="range" min="2" max="80" value="14" oninput="window.imageNodeModule.updatePaintBrushSize(this.value)">
                        <span id="paintBrushSizeLabel">14px</span>
                    </label>
                    <button id="brushUndoBtn" class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.undoBrushDrawing()" title="撤销" style="opacity:.4" disabled><i data-lucide="undo-2" class="w-4 h-4"></i></button>
                    <button id="brushRedoBtn" class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.redoBrushDrawing()" title="恢复" style="opacity:.4" disabled><i data-lucide="redo-2" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.clearBrushDrawing()"><i data-lucide="eraser" class="w-4 h-4"></i>清空</button>
                </div>
                <div id="gridToolbar" class="image-edit-tools" style="display:none;">
                    <button id="gridCustomToggle" class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.toggleGridCustomMode()" title="自由放置切割线">自定义</button>
                    <span id="gridRegularControls" style="display:contents">
                        <label>横向线:
                            <input id="gridHorizontalLines" type="number" min="0" max="20" value="2" oninput="window.imageNodeModule.refreshGridSplitPreview()">
                        </label>
                        <label>竖向线:
                            <input id="gridVerticalLines" type="number" min="0" max="20" value="2" oninput="window.imageNodeModule.refreshGridSplitPreview()">
                        </label>
                    </span>
                    <div id="gridCustomControls" style="display:none;align-items:center;gap:6px">
                        <button id="gridOrientH" class="image-edit-btn primary" type="button" onclick="window.imageNodeModule.setGridCustomOrientation('h')" title="点击图片放置水平线">水平</button>
                        <button id="gridOrientV" class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.setGridCustomOrientation('v')" title="点击图片放置竖直线">垂直</button>
                        <button id="gridUndoBtn" class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.undoGridCustomLine()" title="撤销上一条线" disabled style="opacity:.4"><i data-lucide="undo-2" class="w-3.5 h-3.5"></i></button>
                        <button class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.clearGridCustomLines()" title="清除所有自定义线"><i data-lucide="eraser" class="w-3.5 h-3.5"></i></button>
                    </div>
                    <label class="grid-gap-control">间隔(px):
                        <input id="gridGapSize" type="range" min="0" max="240" step="1" value="0" oninput="window.imageNodeModule.syncGridGapValue();window.imageNodeModule.refreshGridSplitPreview()">
                        <span id="gridGapValue" class="grid-gap-value">0</span>
                    </label>
                    <span id="gridSplitCount" class="image-edit-sub"></span>
                </div>
                <div class="image-edit-actions">
                    <span id="imageEditZoomLabel" class="image-edit-zoom-label" title="双击重置缩放" ondblclick="window.imageNodeModule.resetImageEditZoom()">100%</span>
                    <button id="editorResetBtn" class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.resetCropBox()"><i data-lucide="rotate-ccw" class="w-4 h-4"></i>重置</button>
                    <button class="image-edit-btn secondary" type="button" onclick="window.imageNodeModule.closeImageEditor()">取消</button>
                    <button id="editorApplyBtn" class="image-edit-btn primary" type="button" onclick="window.imageNodeModule.applyCurrentMode()">
                        <i data-lucide="crop" class="w-4 h-4 apply-icon-crop"></i>
                        <i data-lucide="check-circle" class="w-4 h-4 apply-icon-mask" style="display:none;"></i>
                        <i data-lucide="paintbrush" class="w-4 h-4 apply-icon-brush" style="display:none;"></i>
                        <i data-lucide="grid-3x3" class="w-4 h-4 apply-icon-grid" style="display:none;"></i>
                        <span id="editorApplyText">应用裁剪</span>
                    </button>
                </div>
            </div>
        </div>

                    <button class="asset-head-btn" type="button" onclick="refreshAssetList()" title="刷新"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i></button>
