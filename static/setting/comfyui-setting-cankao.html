<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComfyUI 设置</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/lucide.min.js?v=20260520001"></script>
    <script src="/static/theme.js?v=20260516-theme-sync"></script>
    <script src="/static/i18n.js?v=20260512-comfyui"></script>
    <style>
        :root { --bg:#f7f8fa; --panel:#fff; --soft:#f1f4f8; --line:#e8ecf2; --line-strong:#dbe1ea; --text:#0f172a; --muted:#64748b; --faint:#94a3b8; --accent:#0f172a; }
        body.studio-theme-dark, html.studio-theme-dark body { --bg:#0e1014; --panel:#1c1e26; --soft:#272a33; --line:#323540; --line-strong:#3f424d; --text:#e8e8ea; --muted:#a4adbf; --faint:#7a8497; --accent:#f5f6f8; }
        * { box-sizing:border-box; }
        body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; -webkit-font-smoothing:antialiased; }
        button { font-family:inherit; cursor:pointer; border:0; background:transparent; color:inherit; }
        .page { min-height:100vh; padding:32px 24px 80px; }
        .wrap { max-width:1280px; margin:0 auto; }
        .page-head { padding:0 4px 28px; display:flex; justify-content:space-between; align-items:end; gap:24px; flex-wrap:wrap; }
        .page-head .title { font-size:26px; line-height:1.05; font-weight:900; letter-spacing:-.015em; }
        .page-head .sub { margin-top:8px; color:var(--muted); font-size:12.5px; line-height:1.55; font-weight:600; max-width:520px; }
        .page-head .status { color:var(--muted); font-size:11.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; min-height:16px; }
        .layout { display:grid; grid-template-columns:340px minmax(0,1fr); gap:18px; align-items:start; }
        /* Left sidebar — workflow list + preview combined */
        .sidebar { position:sticky; top:24px; display:flex; flex-direction:column; gap:16px; max-height:calc(100vh - 80px); overflow:auto; }
        .side-card { padding:14px; background:var(--panel); border:1px solid var(--line); border-radius:14px; display:flex; flex-direction:column; gap:10px; }
        .side-title { color:var(--faint); font-size:10px; font-weight:900; letter-spacing:.1em; text-transform:uppercase; padding:0 2px; }
        .workflow-list { display:flex; flex-direction:column; gap:4px; max-height:240px; overflow:auto; }
        .workflow-card { width:100%; text-align:left; border:1px solid transparent; background:transparent; border-radius:10px; padding:8px; display:flex; align-items:center; gap:8px; color:var(--muted); transition:all .15s ease; }
        .workflow-card:hover { border-color:var(--text); color:var(--text); }
        .workflow-card.active { background:var(--soft); color:var(--text); border-color:transparent; }
        .workflow-card.active:hover { border-color:var(--text); }
        .workflow-icon { width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; background:var(--soft); color:var(--muted); flex:0 0 auto; }
        .workflow-card.active .workflow-icon { background:var(--panel); color:var(--text); }
        .workflow-name { min-width:0; font-size:12.5px; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .workflow-meta { margin-top:1px; color:var(--faint); font-size:10px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .builtin-badge { font-size:9px; font-weight:900; letter-spacing:.06em; padding:2px 6px; border-radius:5px; background:var(--soft); color:var(--muted); flex:0 0 auto; margin-left:auto; }
        .workflow-card.active .builtin-badge { background:var(--panel); color:var(--muted); }
        .upload-btn { width:100%; height:36px; border:1px dashed var(--line-strong); border-radius:10px; color:var(--muted); display:inline-flex; align-items:center; justify-content:center; gap:6px; font-size:11.5px; font-weight:800; transition:all .15s ease; }
        .upload-btn:hover { color:var(--text); border-color:var(--faint); background:var(--soft); }
        /* Center editor */
        .content { display:flex; flex-direction:column; gap:18px; min-width:0; }
        .content-head { display:flex; align-items:end; justify-content:space-between; gap:16px; flex-wrap:wrap; padding:20px 24px; background:var(--panel); border:1px solid var(--line); border-radius:16px; }
        .content-head .editor-title { font-size:20px; line-height:1.1; font-weight:900; letter-spacing:-.01em; }
        .content-head .editor-sub { margin-top:4px; color:var(--muted); font-size:11.5px; font-weight:700; }
        .content-actions { display:flex; gap:8px; align-items:center; }
        .action-btn { height:36px; padding:0 14px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; gap:6px; font-size:12px; font-weight:800; transition:all .15s ease; border:1px solid var(--line); background:var(--panel); color:var(--muted); }
        .action-btn:hover { color:var(--text); border-color:var(--text); }
        .action-btn.save-btn { background:var(--accent); color:var(--bg); border-color:var(--accent); }
        .action-btn.save-btn:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(15,23,42,.15); }
        .action-btn.danger-btn { color:#dc2626; border-color:#fecaca; background:transparent; }
        .action-btn.danger-btn:hover { background:#fff5f5; }
        body.studio-theme-dark .action-btn.danger-btn { color:#fca5a5; border-color:rgba(248,113,113,.3); }
        body.studio-theme-dark .action-btn.danger-btn:hover { background:rgba(127,29,29,.18); }
        /* Workflow graph */
        .graph-card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px; }
        .graph-head { display:flex; flex-direction:column; align-items:stretch; gap:12px; margin-bottom:10px; }
        .graph-title-row { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; flex-wrap:wrap; }
        .graph-head .editor-title { font-size:20px; line-height:1.1; font-weight:900; letter-spacing:-.01em; }
        .graph-head .editor-sub { margin-top:5px; color:var(--muted); font-size:11.5px; font-weight:700; }
        .graph-head .content-actions { display:flex; gap:8px; flex:0 0 auto; }
        .graph-hint { font-size:11px; color:var(--faint); font-weight:600; }
        .graph-svg-wrap { width:100%; height:760px; overflow:hidden; border:1px solid var(--line); border-radius:10px; background:var(--soft); cursor:grab; }
        .graph-svg-wrap.is-panning { cursor:grabbing; }
        .graph-svg { display:block; width:100%; height:100%; }
        .graph-controls { position:absolute; top:10px; right:10px; display:flex; gap:6px; z-index:8; }
        .graph-ctrl-btn { width:30px; height:30px; border-radius:8px; background:var(--panel); border:1px solid var(--line); color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s ease; box-shadow:0 2px 6px rgba(15,23,42,.06); }
        .graph-ctrl-btn:hover { color:var(--text); border-color:var(--text); }
        .graph-zoom-pill { padding:0 10px; height:30px; border-radius:8px; background:var(--panel); border:1px solid var(--line); color:var(--muted); display:flex; align-items:center; font-size:11px; font-weight:800; font-variant-numeric:tabular-nums; }
        .gnode rect { stroke:var(--line-strong); stroke-width:1; fill:var(--panel); cursor:pointer; transition:all .15s ease; }
        .gnode:hover rect { stroke:var(--text); filter:brightness(1.02); }
        .gnode.has-exposed rect { stroke-width:2; }
        .gnode.is-active rect { stroke-width:2.5; }
        .gnode .gn-title { font-size:11px; font-weight:800; fill:var(--text); pointer-events:none; }
        .gnode .gn-sub { font-size:9px; font-weight:700; fill:var(--muted); pointer-events:none; }
        .gnode .gn-icon { fill:var(--text); pointer-events:none; }
        .gedge { stroke:var(--line-strong); stroke-width:1.5; fill:none; pointer-events:none; opacity:.7; }
        .gnode.has-exposed .gn-title { fill:var(--text); }
        .gbadge { font-size:8px; font-weight:900; fill:#b45309; pointer-events:none; }
        body.studio-theme-dark .gbadge { fill:#fbbf24; }
        /* 节点分类色（极淡，仅作分组提示） */
        .gnode.cat-prompt    rect { fill:#fef9e7; stroke:#eab308; }
        .gnode.cat-loader    rect { fill:#eff6ff; stroke:#3b82f6; }
        .gnode.cat-lora      rect { fill:#fef3c7; stroke:#f59e0b; }
        .gnode.cat-sampler   rect { fill:#f5f3ff; stroke:#8b5cf6; }
        .gnode.cat-image     rect { fill:#ecfdf5; stroke:#10b981; }
        .gnode.cat-output    rect { fill:#f3f4f6; stroke:#6b7280; }
        .gnode.cat-latent    rect { fill:#fdf2f8; stroke:#ec4899; }
        .gnode.cat-controlnet rect { fill:#fff7ed; stroke:#f97316; }
        body.studio-theme-dark .gnode.cat-prompt    rect { fill:#3a3315; stroke:#eab308; }
        body.studio-theme-dark .gnode.cat-loader    rect { fill:#1a2845; stroke:#60a5fa; }
        body.studio-theme-dark .gnode.cat-lora      rect { fill:#3a2a10; stroke:#fbbf24; }
        body.studio-theme-dark .gnode.cat-sampler   rect { fill:#2a1e44; stroke:#a78bfa; }
        body.studio-theme-dark .gnode.cat-image     rect { fill:#0f3825; stroke:#34d399; }
        body.studio-theme-dark .gnode.cat-output    rect { fill:#2a2d35; stroke:#9ca3af; }
        body.studio-theme-dark .gnode.cat-latent    rect { fill:#3a1d2c; stroke:#f472b6; }
        body.studio-theme-dark .gnode.cat-controlnet rect { fill:#3a2410; stroke:#fb923c; }
        /* 浮窗参数编辑面板 */
        .popup-backdrop { position:absolute; inset:0; background:rgba(15,23,42,.35); border-radius:10px; z-index:5; }
        body.studio-theme-dark .popup-backdrop { background:rgba(0,0,0,.5); }
        .popup-panel { position:absolute; width:380px; max-height:70vh; background:var(--panel); border:1px solid var(--line-strong); border-radius:14px; box-shadow:0 24px 60px rgba(15,23,42,.22); z-index:10; display:flex; flex-direction:column; overflow:hidden; overscroll-behavior:contain; }
        body.studio-theme-dark .popup-panel { box-shadow:0 24px 60px rgba(0,0,0,.5); }
        .popup-head { display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line); background:var(--soft); }
        .popup-icon { font-size:20px; line-height:1; flex:0 0 auto; }
        .popup-title { font-size:14px; font-weight:850; color:var(--text); letter-spacing:-.01em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
        .popup-sub { font-size:10.5px; font-weight:700; color:var(--muted); letter-spacing:.04em; }
        .popup-close { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--muted); cursor:pointer; flex:0 0 auto; transition:all .15s ease; }
        .popup-close:hover { background:var(--line); color:var(--text); }
        .popup-body { padding:12px; overflow:auto; overscroll-behavior:contain; display:flex; flex-direction:column; gap:8px; }
        .popup-body .input-row { grid-template-columns:32px minmax(0,1fr); padding:8px; }
        .popup-body .input-row .small-input,
        .popup-body .input-row .small-select { grid-column:1/-1; margin-top:6px; }
        .popup-body .input-row .small-select { margin-top:4px; }
        .popup-empty { padding:24px; text-align:center; color:var(--faint); font-size:11px; font-weight:700; }
        /* 节点列表切换 */
        .nodes-toggle { display:flex; align-items:center; justify-content:center; gap:6px; padding:10px; background:var(--soft); border:1px dashed var(--line-strong); border-radius:12px; color:var(--muted); font-size:11.5px; font-weight:800; cursor:pointer; transition:all .15s ease; }
        .nodes-toggle:hover { color:var(--text); border-color:var(--faint); }
        .node-list.hidden { display:none; }
        .node-list { display:flex; flex-direction:column; gap:10px; }
        .node-card { background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
        .node-card-head { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 18px; cursor:pointer; user-select:none; transition:background .15s ease; }
        .node-card-head:hover { background:var(--soft); }
        .node-card.expanded .node-card-head { border-bottom:1px solid var(--line); }
        .node-class { font-size:13px; font-weight:850; color:var(--text); letter-spacing:-.01em; }
        .node-id { font-size:10.5px; font-weight:700; color:var(--faint); letter-spacing:.04em; }
        .node-stats { font-size:10.5px; font-weight:700; color:var(--muted); letter-spacing:.02em; }
        .node-chev { color:var(--faint); transition:transform .15s ease; }
        .node-card.expanded .node-chev { transform:rotate(180deg); }
        .node-inputs { display:none; padding:14px 18px; flex-direction:column; gap:10px; }
        .node-card.expanded .node-inputs { display:flex; }
        .input-row { display:grid; grid-template-columns:36px minmax(0,1fr) 120px 140px; gap:10px; align-items:center; padding:10px; border:1px solid var(--line); border-radius:11px; background:var(--soft); }
        body.studio-theme-dark .input-row { background:var(--soft); border-color:var(--line-strong); }
        .input-row.is-active { border-color:var(--text); background:var(--panel); }
        body.studio-theme-dark .input-row.is-active { background:var(--soft); border-color:#f5f6f8; }
        .check-toggle { width:18px; height:18px; border:1.5px solid var(--line-strong); border-radius:5px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s ease; background:var(--panel); margin:0 auto; }
        .check-toggle.checked { background:var(--accent); border-color:var(--accent); color:var(--bg); }
        body.studio-theme-dark .check-toggle.checked { background:#f5f6f8; color:#0e1014; border-color:#f5f6f8; }
        .input-info { min-width:0; }
        .input-key { font-size:12.5px; font-weight:800; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .input-orig { font-size:10.5px; font-weight:700; color:var(--faint); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .small-input { width:100%; height:30px; padding:0 10px; border:1px solid var(--line); border-radius:8px; background:var(--panel); color:var(--text); outline:none; font-size:12px; font-weight:650; }
        .small-input:focus { border-color:var(--text); }
        body.studio-theme-dark .small-input { background:var(--soft); border-color:var(--line-strong); }
        .small-select { width:100%; height:30px; padding:0 8px; border:1px solid var(--line); border-radius:8px; background:var(--panel); color:var(--text); outline:none; font-size:12px; font-weight:650; cursor:pointer; }
        body.studio-theme-dark .small-select { background:var(--soft); border-color:var(--line-strong); }
        .extras-row { grid-column:1/-1; display:none; gap:8px; padding-top:8px; border-top:1px dashed var(--line); }
        .input-row.has-extras .extras-row { display:flex; }
        .extra-pair { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); font-weight:700; }
        .extra-pair input, .extra-pair textarea { width:80px; }
        .extras-row textarea { width:100%; height:60px; padding:6px 10px; border:1px solid var(--line); border-radius:8px; background:var(--panel); color:var(--text); outline:none; font-size:12px; font-weight:650; font-family:inherit; resize:vertical; }
        .dropdown-opt-row { display:flex; align-items:center; gap:6px; padding:4px; border-radius:7px; background:var(--panel); border:1px solid var(--line); }
        body.studio-theme-dark .dropdown-opt-row { background:var(--soft); border-color:var(--line-strong); }
        .dropdown-opt-row .opt-index { width:18px; text-align:center; font-size:10.5px; color:var(--faint); font-weight:800; font-variant-numeric:tabular-nums; flex:0 0 auto; }
        .dropdown-opt-row .small-input { flex:1; }
        .opt-type-tag { font-size:9.5px; font-weight:800; padding:2px 6px; border-radius:5px; background:var(--line); color:var(--muted); letter-spacing:.04em; flex:0 0 auto; }
        .opt-type-tag.is-num { background:rgba(59,130,246,.15); color:#1d4ed8; }
        body.studio-theme-dark .opt-type-tag.is-num { background:rgba(96,165,250,.2); color:#60a5fa; }
        .opt-del { width:24px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:var(--faint); background:transparent; flex:0 0 auto; cursor:pointer; }
        .opt-del:hover { color:#dc2626; background:rgba(239,68,68,.08); }
        body.studio-theme-dark .extras-row textarea { background:var(--soft); border-color:var(--line-strong); }
        .empty-state { padding:48px 24px; text-align:center; background:var(--panel); border:1px dashed var(--line); border-radius:16px; color:var(--muted); }
        .empty-state .empty-icon { width:48px; height:48px; margin:0 auto 12px; border-radius:14px; display:flex; align-items:center; justify-content:center; background:var(--soft); color:var(--faint); }
        .empty-state .empty-title { font-size:14px; font-weight:850; color:var(--text); margin-bottom:4px; }
        .empty-state .empty-desc { font-size:12px; font-weight:600; line-height:1.5; }
        /* Right preview */
        .preview { position:sticky; top:24px; display:flex; flex-direction:column; gap:12px; min-width:0; }
        .preview-title-row { display:flex; align-items:center; gap:8px; }
        .preview-title { font-size:13px; font-weight:850; color:var(--text); }
        .preview-pill { font-size:10px; font-weight:800; letter-spacing:.06em; padding:2px 8px; border-radius:5px; background:var(--soft); color:var(--muted); }
        .workspace-mode-tabs { display:grid; grid-template-columns:1fr 1fr; gap:4px; width:220px; margin:10px auto 0; padding:4px; border:1px solid var(--line); border-radius:12px; background:var(--soft); }
        .workspace-mode-tabs button { height:30px; min-width:88px; border-radius:9px; color:var(--muted); font-size:11px; font-weight:850; }
        .workspace-mode-tabs button.active { background:var(--panel); color:var(--text); box-shadow:0 1px 4px rgba(15,23,42,.08); }
        .preview-desc { color:var(--muted); font-size:11.5px; font-weight:600; line-height:1.5; margin-bottom:4px; }
        #previewContent { display:flex; flex-direction:column; gap:12px; padding-top:6px; border-top:1px solid var(--line); }
        .preview-empty { padding:32px 16px; text-align:center; color:var(--faint); font-size:12px; font-weight:700; line-height:1.6; border:1px dashed var(--line); border-radius:12px; }
        .pfield { display:flex; flex-direction:column; gap:6px; }
        .pfield-label { color:var(--muted); font-size:11px; font-weight:800; letter-spacing:.02em; }
        .pfield-input, .pfield-textarea, .pfield-select { width:100%; padding:8px 12px; border:1px solid var(--line); border-radius:10px; background:var(--soft); color:var(--text); outline:none; font-size:13px; font-weight:650; font-family:inherit; }
        .pfield-textarea { min-height:70px; resize:vertical; line-height:1.5; }
        .pfield-input:focus, .pfield-textarea:focus, .pfield-select:focus { border-color:var(--text); background:var(--panel); }
        body.studio-theme-dark .pfield-input, body.studio-theme-dark .pfield-textarea, body.studio-theme-dark .pfield-select { background:var(--soft); border-color:var(--line-strong); }
        .pfield-slider { display:flex; align-items:center; gap:10px; }
        .pfield-slider input[type=range] { flex:1; accent-color:var(--text); }
        .pfield-slider-val { min-width:42px; text-align:right; font-size:12.5px; font-weight:800; color:var(--text); font-variant-numeric:tabular-nums; }
        .pfield-bool { display:flex; align-items:center; gap:10px; }
        .pfield-bool-track { position:relative; width:36px; height:20px; border-radius:999px; background:var(--soft); border:1px solid var(--line-strong); cursor:pointer; transition:background .15s ease; }
        .pfield-bool-track.on { background:var(--accent); }
        body.studio-theme-dark .pfield-bool-track.on { background:#f5f6f8; }
        .pfield-bool-thumb { position:absolute; top:2px; left:2px; width:14px; height:14px; background:#fff; border-radius:50%; transition:transform .15s ease; }
        body.studio-theme-dark .pfield-bool-thumb { background:#0e1014; }
        body.studio-theme-dark .pfield-bool-track:not(.on) .pfield-bool-thumb { background:#f5f6f8; }
        .pfield-bool-track.on .pfield-bool-thumb { transform:translateX(16px); }
        .pfield-image-drop { padding:18px; border:1px dashed var(--line-strong); border-radius:12px; text-align:center; color:var(--muted); font-size:11.5px; font-weight:700; background:var(--soft); cursor:pointer; transition:all .15s ease; }
        .pfield-image-drop:hover { border-color:var(--text); color:var(--text); }
        .pfield-image-drop.has-image { padding:0; border-style:solid; }
        .pfield-image-drop img { width:100%; max-height:160px; object-fit:contain; border-radius:11px; display:block; }
        .run-btn { width:100%; height:42px; padding:0 16px; border-radius:12px; background:var(--accent); color:var(--bg); display:inline-flex; align-items:center; justify-content:center; gap:8px; font-size:13px; font-weight:850; transition:all .15s ease; }
        .run-btn:hover { transform:translateY(-1px); box-shadow:0 8px 20px rgba(15,23,42,.18); }
        .run-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; box-shadow:none; }
        .run-result { padding:14px; background:var(--soft); border:1px solid var(--line); border-radius:12px; }
        .run-result img { width:100%; border-radius:10px; display:block; cursor:zoom-in; }
        .run-status { font-size:11px; font-weight:700; color:var(--muted); margin-top:8px; text-align:center; }
        .title-edit-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .workflow-title-input { width:min(420px, 100%); height:30px; border:0; border-bottom:1px dashed var(--line-strong); border-radius:0; background:transparent; color:var(--text); outline:none; padding:0 2px 2px; font-size:20px; line-height:1.1; font-weight:900; letter-spacing:-.01em; }
        .workflow-title-input:hover { border-bottom-color:var(--muted); }
        .workflow-title-input:focus { border-bottom-color:var(--text); background:transparent; }
        .mini-canvas { height:420px; border:1px solid var(--line); border-radius:12px; background-color:var(--soft); background-image:radial-gradient(var(--line-strong) 1px, transparent 1px); background-size:22px 22px; overflow:hidden; position:relative; cursor:grab; }
        .mini-canvas.large { height:760px; }
        .mini-canvas.is-panning { cursor:grabbing; }
        .mini-world { position:absolute; left:0; top:0; transform-origin:0 0; width:900px; height:620px; }
        .mini-toolbar { position:absolute; top:12px; left:12px; display:flex; gap:8px; z-index:4; }
        .mini-tool { height:32px; padding:0 10px; border-radius:999px; background:var(--panel); border:1px solid var(--line); color:var(--muted); display:flex; align-items:center; gap:6px; font-size:11px; font-weight:850; box-shadow:0 8px 18px rgba(15,23,42,.08); }
        .mini-tool:hover { color:var(--text); border-color:var(--text); }
        .mini-card { position:absolute; width:230px; border:1px solid var(--line); border-radius:12px; background:var(--panel); box-shadow:0 12px 30px rgba(15,23,42,.08); overflow:hidden; user-select:none; }
        .mini-card.comfy-card { width:270px; }
        .mini-card-head { height:34px; display:flex; align-items:center; gap:8px; padding:0 10px; border-bottom:1px solid var(--line); color:var(--text); font-size:11px; font-weight:900; cursor:grab; }
        .mini-card-body { padding:10px; display:flex; flex-direction:column; gap:8px; }
        .mini-node-title { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .mini-delete { width:22px; height:22px; border-radius:999px; color:var(--faint); display:flex; align-items:center; justify-content:center; }
        .mini-delete:hover { background:var(--soft); color:#dc2626; }
        .mini-textarea { width:100%; min-height:92px; resize:vertical; border:1px solid var(--line); border-radius:10px; background:var(--soft); color:var(--text); outline:none; padding:8px; font-size:12px; font-weight:650; line-height:1.45; user-select:text; }
        .mini-input { width:100%; height:32px; border:1px solid var(--line); border-radius:9px; background:var(--soft); color:var(--text); outline:none; padding:0 9px; font-size:12px; font-weight:650; user-select:text; }
        .mini-image-drop { min-height:120px; border:1px dashed var(--line-strong); border-radius:10px; display:flex; align-items:center; justify-content:center; text-align:center; color:var(--muted); background:var(--soft); font-size:11px; font-weight:800; cursor:pointer; }
        .mini-image-drop img { width:100%; max-height:170px; object-fit:contain; border-radius:9px; display:block; }
        .mini-settings-list { display:flex; flex-direction:column; gap:8px; max-height:230px; overflow:auto; }
        .mini-result img { width:100%; border-radius:9px; display:block; cursor:zoom-in; }
        .image-lightbox { position:fixed; inset:0; z-index:100; display:none; align-items:center; justify-content:center; padding:36px; background:rgba(15,23,42,.42); backdrop-filter:blur(16px); }
        .image-lightbox.open { display:flex; }
        .image-lightbox img { display:block; max-width:min(1120px, 92vw); max-height:86vh; object-fit:contain; border-radius:18px; background:var(--panel); box-shadow:0 30px 90px rgba(0,0,0,.28); }
        .mini-line { position:absolute; height:2px; background:var(--line-strong); transform-origin:0 50%; pointer-events:none; opacity:.85; }
        .mini-port { position:absolute; top:50%; width:10px; height:10px; border-radius:999px; background:var(--text); box-shadow:0 0 0 3px var(--panel), 0 0 0 4px var(--line-strong); transform:translateY(-50%); }
        .mini-port.in { left:-5px; }
        .mini-port.out { right:-5px; }
        .mini-run { margin-top:10px; }
        @media (max-width:1100px) { .layout { grid-template-columns:1fr; } .sidebar, .preview { position:static; } }
    </style>
    <link rel="stylesheet" href="/static/theme.css?v=20260512-comfyui">
</head>
<body>
    <div class="page">
        <div class="wrap">
            <header class="page-head">
                <div>
                    <div class="title" data-i18n="comfy.title">ComfyUI 设置</div>
                    <div class="sub" data-i18n="comfy.subtitle">上传 API 格式的工作流，选择想暴露给画布的节点参数并自定义名称、控件类型，右侧实时预览并支持运行测试。</div>
                </div>
                <div id="status" class="status"></div>
            </header>

            <div class="layout">
                <aside class="sidebar">
                    <div class="side-card">
                        <div class="side-title">ComfyUI 后端地址</div>
                        <div id="comfyInstancesList" style="display:flex;flex-direction:column;gap:6px"></div>
                        <button class="upload-btn" type="button" onclick="addComfyInstance()">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i><span>添加后端</span>
                        </button>
                        <div style="display:flex;gap:6px">
                            <button class="upload-btn" type="button" onclick="saveComfyInstances()" style="flex:1;border-style:solid;background:var(--panel);color:var(--text);border-color:var(--text)">
                                <i data-lucide="save" class="w-3.5 h-3.5"></i><span>保存</span>
                            </button>
                        </div>
                        <div style="font-size:10.5px;color:var(--faint);line-height:1.55;font-weight:600">格式：<span style="font-family:ui-monospace,Menlo,monospace">host:port</span>（如 <span style="font-family:ui-monospace,Menlo,monospace">127.0.0.1:8188</span>）</div>
                    </div>

                    <div class="side-card">
                        <div class="side-title" data-i18n="comfy.workflowList">工作流列表</div>
                        <div id="workflowList" class="workflow-list"></div>
                        <button class="upload-btn" type="button" onclick="document.getElementById('uploadInput').click()">
                            <i data-lucide="upload" class="w-3.5 h-3.5"></i><span data-i18n="comfy.uploadWorkflow">上传工作流</span>
                        </button>
                        <input id="uploadInput" type="file" accept="application/json" style="display:none" onchange="onUpload(event)">
                    </div>

                    <div class="side-card" id="previewCard">
                        <div class="preview-title-row">
                            <i data-lucide="eye" class="w-4 h-4" style="color:var(--muted)"></i>
                            <div class="preview-title" data-i18n="comfy.nodePreview">画布节点预览</div>
                            <div class="preview-pill" data-i18n="comfy.live">实时</div>
                        </div>
                        <div class="preview-desc" data-i18n="comfy.previewDesc">这个工作流在画布 Comfy 节点上将显示出的控件，可直接填写并点击「运行测试」。</div>
                        <div id="previewContent">
                            <div class="preview-empty" data-i18n="comfy.previewEmpty">勾选节点输入字段后<br>预览将出现在这里</div>
                        </div>
                    </div>
                </aside>

                <main class="content">
                    <div id="graphCard" class="graph-card" style="display:none">
                        <div class="graph-head">
                            <div class="graph-title-row">
                                <div style="min-width:0;flex:1">
                                    <div class="title-edit-row">
                                        <input id="workflowTitleInput" class="workflow-title-input" type="text" placeholder="工作流名称" data-i18n-placeholder="comfy.workflowName" oninput="updateWorkflowTitle(this.value)">
                                    </div>
                                    <div id="editorSub" class="editor-sub" data-i18n="comfy.editorSubDefault">从左侧列表选择，或上传新的 API 工作流</div>
                                </div>
                                <div class="content-actions">
                                    <button id="deleteBtn" class="action-btn danger-btn" type="button" onclick="onDelete()" style="display:none">
                                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i><span data-i18n="common.delete">删除</span>
                                    </button>
                                    <button id="saveBtn" class="action-btn save-btn" type="button" onclick="onSave()" style="display:none">
                                        <i data-lucide="save" class="w-3.5 h-3.5"></i><span data-i18n="comfy.saveConfig">保存配置</span>
                                    </button>
                                </div>
                            </div>
                            <div class="workspace-mode-tabs">
                                <button id="workspaceGraphTab" type="button" class="active" onclick="setWorkspaceMode('graph')" data-i18n="comfy.workflow">工作流</button>
                                <button id="workspaceCanvasTab" type="button" onclick="setWorkspaceMode('canvas')" data-i18n="comfy.testCanvas">测试画布</button>
                            </div>
                        </div>
                        <div class="graph-svg-wrap" style="position:relative">
                            <svg id="graphSvg" class="graph-svg"></svg>
                            <div class="graph-controls">
                                <div class="graph-ctrl-btn" onclick="graphZoom(-1)" title="缩小" data-i18n-title="canvas.decrease"><i data-lucide="zoom-out" class="w-4 h-4"></i></div>
                                <div id="zoomPill" class="graph-zoom-pill">100%</div>
                                <div class="graph-ctrl-btn" onclick="graphZoom(1)" title="放大" data-i18n-title="canvas.increase"><i data-lucide="zoom-in" class="w-4 h-4"></i></div>
                                <div class="graph-ctrl-btn" onclick="graphFit()" title="适应窗口"><i data-lucide="maximize" class="w-4 h-4"></i></div>
                            </div>
                            <div id="popupBackdrop" class="popup-backdrop" style="display:none" onclick="closeNodePopup()"></div>
                            <div id="nodePopup" class="popup-panel" style="display:none"></div>
                        </div>
                        <div id="miniCanvasHost" style="display:none"></div>
                    </div>
                    <div id="nodesToggle" class="nodes-toggle" style="display:none" onclick="toggleNodeList()">
                        <i data-lucide="list" class="w-3.5 h-3.5"></i>
                        <span id="nodesToggleText" data-i18n="comfy.showNodeList">显示完整节点列表</span>
                    </div>
                    <div id="nodeList" class="node-list hidden"></div>
                </main>

            </div>
        </div>
    </div>
    <div id="imageLightbox" class="image-lightbox" onclick="closeImagePreview()">
        <img id="imageLightboxImg" src="" alt="preview" onclick="event.stopPropagation()">
    </div>

    <script>
        function tr(key){ return window.StudioI18n ? window.StudioI18n.t(key) : key; }
        function tf(key, vars={}){
            return Object.entries(vars).reduce((text, [k,v]) => text.replaceAll(`{${k}}`, v), tr(key));
        }
        function refreshLanguageView(){
            document.title = tr('comfy.title');
            renderList();
            renderEditor();
            renderPreview();
            renderWorkspaceView();
            refreshIcons();
        }
        function applyLanguage(){
            if(window.StudioI18n) window.StudioI18n.apply();
            refreshLanguageView();
        }
        function refreshIcons(){ if(window.lucide) lucide.createIcons(); }

        const TYPES = [
            { v:'text', zh:'文本', en:'Text' },
            { v:'textarea', zh:'多行文本', en:'Textarea' },
            { v:'number', zh:'数字', en:'Number' },
            { v:'slider', zh:'滑块', en:'Slider' },
            { v:'dropdown', zh:'下拉框', en:'Dropdown' },
            { v:'image', zh:'图片', en:'Image' },
            { v:'boolean', zh:'开关', en:'Switch' },
        ];
        function currentLang(){ return window.StudioI18n?.lang?.() === 'en' ? 'en' : 'zh'; }
        function typeLabel(type){
            const item = TYPES.find(t => t.v === type);
            return item ? item[currentLang()] : type;
        }

        // ComfyUI 节点类型 → 中文 + 图标 + 颜色分类
        const NODE_INFO = {
            'KSampler':              { label:'采样器',        icon:'⚙', cat:'sampler' },
            'KSamplerAdvanced':      { label:'采样器（高级）',icon:'⚙', cat:'sampler' },
            'SamplerCustom':         { label:'自定义采样',    icon:'⚙', cat:'sampler' },
            'CheckpointLoaderSimple':{ label:'主模型加载',    icon:'📦', cat:'loader' },
            'UNETLoader':            { label:'UNet 加载',     icon:'📦', cat:'loader' },
            'VAELoader':             { label:'VAE 加载',      icon:'📦', cat:'loader' },
            'CLIPLoader':            { label:'CLIP 加载',     icon:'📦', cat:'loader' },
            'DualCLIPLoader':        { label:'双 CLIP 加载',  icon:'📦', cat:'loader' },
            'LoraLoader':            { label:'LoRA 加载',     icon:'⚡', cat:'lora' },
            'LoraLoaderModelOnly':   { label:'LoRA 加载（仅模型）', icon:'⚡', cat:'lora' },
            'CLIPTextEncode':        { label:'提示词编码',    icon:'✎', cat:'prompt' },
            'CLIPTextEncodeFlux':    { label:'Flux 提示词',   icon:'✎', cat:'prompt' },
            'ConditioningCombine':   { label:'条件合并',      icon:'⊕', cat:'prompt' },
            'ConditioningConcat':    { label:'条件拼接',      icon:'⊕', cat:'prompt' },
            'VAEDecode':             { label:'VAE 解码',      icon:'◐', cat:'vae' },
            'VAEEncode':             { label:'VAE 编码',      icon:'◑', cat:'vae' },
            'LoadImage':             { label:'图片加载',      icon:'🖼', cat:'image' },
            'SaveImage':             { label:'图片保存',      icon:'💾', cat:'output' },
            'PreviewImage':          { label:'图片预览',      icon:'👁', cat:'output' },
            'ImageScale':            { label:'图片缩放',      icon:'⇆', cat:'image' },
            'EmptyLatentImage':      { label:'空白潜空间',    icon:'▦', cat:'latent' },
            'LatentUpscaleBy':       { label:'潜空间放大',    icon:'↗', cat:'latent' },
            'ControlNetApply':       { label:'ControlNet',    icon:'⇨', cat:'controlnet' },
            'ControlNetLoader':      { label:'ControlNet 加载',icon:'📦', cat:'loader' },
            'PrimitiveNode':         { label:'常量',          icon:'•', cat:'misc' },
            'Note':                  { label:'备注',          icon:'≡', cat:'misc' },
        };

        // 常见输入字段 → 中文友好名
        const INPUT_LABELS = {
            'text': '提示词文本',
            'prompt': '提示词',
            'positive': '正向条件',
            'negative': '负向条件',
            'seed': '随机种子',
            'noise_seed': '噪声种子',
            'steps': '采样步数',
            'cfg': 'CFG 引导系数',
            'sampler_name': '采样方法',
            'scheduler': '调度器',
            'denoise': '重绘强度',
            'width': '宽度',
            'height': '高度',
            'batch_size': '批量大小',
            'megapixels': '百万像素',
            'strength_model': '模型强度',
            'strength_clip': 'CLIP 强度',
            'lora_name': 'LoRA 模型',
            'ckpt_name': '主模型',
            'vae_name': 'VAE 模型',
            'clip_name': 'CLIP 模型',
            'clip_name1': 'CLIP 模型 1',
            'clip_name2': 'CLIP 模型 2',
            'unet_name': 'UNet 模型',
            'control_net_name': 'ControlNet 模型',
            'image': '图片',
            'images': '图片',
            'mask': '蒙版',
            'latent': '潜空间',
            'value': '数值',
            'string': '字符串',
            'strength': '强度',
            'guidance': '引导系数',
            'resolution': '分辨率',
            'filename_prefix': '文件名前缀',
            'upscale_method': '放大方式',
            'crop': '裁剪方式',
        };

        function nodeLabel(node){
            if(node._meta?.title) return node._meta.title;
            return NODE_INFO[node.class_type]?.label || node.class_type || '未命名';
        }
        function nodeSub(node){
            const info = NODE_INFO[node.class_type];
            if(info && node._meta?.title) return info.label + ' · ' + node.class_type;
            return node.class_type || '';
        }
        function nodeIcon(node){
            return NODE_INFO[node.class_type]?.icon || '◆';
        }
        function inputLabel(name){
            return INPUT_LABELS[name] || name;
        }

        let workflows = [];
        let selectedName = '';
        let currentWorkflow = null;     // 原始 JSON
        let currentConfig = null;       // { title, fields:[...] }
        let isBuiltin = false;
        let previewValues = {};         // field_id -> 发给后端的值（图片：comfy 文件名）
        let previewImageUrls = {};      // field_id -> 浏览器可显示的本地 URL（仅图片字段）
        let runResult = null;           // url 或 null
        let workspaceMode = 'graph';
        let miniView = { k: 1, x: 0, y: 0 };
        let miniCards = {};
        let miniTestNodes = [];
        let miniDrag = null;

        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('workflowList');
        const workflowTitleInput = document.getElementById('workflowTitleInput');
        const subEl = document.getElementById('editorSub');
        const deleteBtn = document.getElementById('deleteBtn');
        const saveBtn = document.getElementById('saveBtn');
        const nodeListEl = document.getElementById('nodeList');
        const previewCard = document.getElementById('previewContent');
        const miniCanvasHost = document.getElementById('miniCanvasHost');

        function setStatus(text){ statusEl.textContent = text || ''; }
        function escapeHtml(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
        function escapeAttr(s){ return escapeHtml(s); }
        function fieldKind(f){
            if(f.type === 'image') return 'image';
            const key = `${f.input || ''} ${f.name || ''}`.toLowerCase();
            if(f.type === 'textarea' || /prompt|text|提示词|正向|负向/.test(key)) return 'prompt';
            return 'setting';
        }
        function defaultMiniCards(){
            return {
                prompt:{ x:24, y:30 },
                image:{ x:24, y:210 },
                custom:{ x:280, y:78 },
                output:{ x:540, y:120 }
            };
        }
        function defaultMiniTestNodes(){
            return [
                { id:'prompt_1', type:'prompt', x:36, y:96, text:'' },
                { id:'image_1', type:'image', x:36, y:286, url:'', value:'' },
                { id:'comfy_1', type:'comfy', x:330, y:150 },
                { id:'output_1', type:'output', x:670, y:190 }
            ];
        }

        // —— ComfyUI 后端地址管理 ——
        let comfyInstances = [];
        async function loadComfyInstances(){
            try {
                const data = await fetch('/api/comfyui/instances').then(r => r.json());
                comfyInstances = Array.isArray(data.instances) ? data.instances : [];
                renderComfyInstances();
            } catch(e){ console.error(e); }
        }
        function renderComfyInstances(){
            const el = document.getElementById('comfyInstancesList');
            if(!el) return;
            el.innerHTML = comfyInstances.map((addr, i) => `
                <div style="display:flex;align-items:center;gap:6px;padding:4px;border:1px solid var(--line);border-radius:9px;background:var(--soft)">
                    <span style="width:18px;text-align:center;font-size:10.5px;color:var(--faint);font-weight:800">${i + 1}</span>
                    <input class="small-input" type="text" value="${escapeAttr(addr)}" placeholder="host:port" oninput="updateComfyInstance(${i}, this.value)" style="flex:1;height:28px;padding:0 8px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--text);font-size:12px;font-family:ui-monospace,Menlo,monospace">
                    <button class="opt-del" type="button" onclick="removeComfyInstance(${i})" title="删除"><i data-lucide="x" class="w-3 h-3"></i></button>
                </div>
            `).join('');
            refreshIcons();
        }
        function addComfyInstance(){
            comfyInstances = [...comfyInstances, ''];
            renderComfyInstances();
        }
        function updateComfyInstance(index, value){
            comfyInstances[index] = value;
        }
        function removeComfyInstance(index){
            comfyInstances = comfyInstances.filter((_, i) => i !== index);
            renderComfyInstances();
        }
        async function saveComfyInstances(){
            const cleaned = comfyInstances.map(s => String(s||'').trim()).filter(Boolean);
            if(!cleaned.length){ alert('请至少填一个 ComfyUI 后端地址'); return; }
            setStatus('保存中...');
            try {
                const res = await fetch('/api/comfyui/instances', {
                    method:'PUT',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ instances: cleaned })
                });
                if(!res.ok) throw new Error((await res.json()).detail || '保存失败');
                const data = await res.json();
                comfyInstances = data.instances || cleaned;
                renderComfyInstances();
                setStatus('ComfyUI 后端地址已保存');
            } catch(e){
                alert(e.message || '保存失败');
                setStatus('保存失败');
            }
        }

        async function loadList(){
            try {
                const data = await fetch('/api/workflows').then(r=>r.json());
                workflows = data.workflows || [];
                renderList();
                // 自动加载：当前没选中 或 之前选中的已不存在 → 选第一个
                const stillExists = selectedName && workflows.some(w => w.name === selectedName);
                if(!stillExists && workflows.length){
                    await selectWorkflow(workflows[0].name);
                }
            } catch(e){ setStatus(tr('comfy.loadFailed')); console.error(e); }
        }
        // iframe 在 index.html 里通过 switchUI 显示，首次显示时可能 DOMContentLoaded 已经过去；
        // 添加一个 pageshow 监听确保进入页面时一定刷新
        window.addEventListener('pageshow', () => {
            if(!currentWorkflow && workflows.length === 0) loadList();
        });

        function renderList(){
            listEl.innerHTML = workflows.map(w => `
                <button class="workflow-card ${w.name===selectedName?'active':''}" type="button" onclick="selectWorkflow('${escapeHtml(w.name)}')">
                    <span class="workflow-icon"><i data-lucide="${w.builtin?'package':'file-json-2'}" class="w-3.5 h-3.5"></i></span>
                    <span class="min-w-0" style="flex:1">
                        <div class="workflow-name">${escapeHtml(w.title)}</div>
                        <div class="workflow-meta">${tf('comfy.fieldCount', {count:w.field_count})}</div>
                    </span>
                    ${w.builtin?`<span class="builtin-badge">${tr('comfy.builtin')}</span>`:''}
                </button>
            `).join('');
            refreshIcons();
        }

        async function selectWorkflow(name){
            selectedName = name;
            renderList();
            try {
                setStatus(tr('comfy.loading'));
                const data = await fetch(`/api/workflows/${encodeURIComponent(name)}`).then(r=>r.json());
                currentWorkflow = data.workflow;
                currentConfig = data.config || { title:name.replace('.json',''), fields:[] };
                if(!currentConfig.fields) currentConfig.fields = [];
                if(!currentConfig.mini_cards) currentConfig.mini_cards = {};
                isBuiltin = !!data.builtin;
                miniCards = {...defaultMiniCards(), ...currentConfig.mini_cards};
                currentConfig.mini_cards = miniCards;
                // 释放上一次的图片 blob URL
                Object.values(previewImageUrls).forEach(u => { try { URL.revokeObjectURL(u); } catch(e){} });
                previewImageUrls = {};
                previewValues = {};
                currentConfig.fields.forEach(f => {
                    if(f.default !== undefined && f.default !== null) previewValues[f.id] = f.default;
                });
                runResult = null;
                graphView = { k: 1, x: 0, y: 0 };
                miniView = { k: 1, x: 0, y: 0 };
                miniTestNodes = defaultMiniTestNodes();
                renderEditor();
                renderPreview();
                // 新工作流加载后自动适配窗口
                setTimeout(() => graphFit(), 50);
                setStatus('');
            } catch(e){ setStatus(tr('comfy.openFailed')); console.error(e); }
        }

        function fieldFor(node, input){
            return currentConfig.fields.find(f => f.node === node && f.input === input);
        }
        function makeFieldId(){ return 'f_' + Math.random().toString(36).slice(2,9); }

        function toggleField(node, input){
            const existing = fieldFor(node, input);
            if(existing){
                currentConfig.fields = currentConfig.fields.filter(f => f !== existing);
                delete previewValues[existing.id];
            } else {
                const nodeData = currentWorkflow[node];
                const rawValue = nodeData?.inputs?.[input];
                const type = guessType(rawValue, input);
                const f = {
                    id: makeFieldId(),
                    node, input,
                    name: inputLabel(input),
                    type,
                    default: typeof rawValue === 'object' ? null : rawValue,
                    options: [],
                };
                if(type === 'slider' || type === 'number') {
                    if(typeof rawValue === 'number'){
                        f.min = 0;
                        f.max = Math.max(rawValue * 2, 10);
                        f.step = rawValue > 0 && rawValue < 5 ? 0.1 : 1;
                    }
                }
                currentConfig.fields.push(f);
                if(f.default !== undefined && f.default !== null) previewValues[f.id] = f.default;
            }
            renderEditor();
            renderPreview();
            // 浮窗打开时同步刷新浮窗内容
            if(popupNodeId === node) refreshPopupBody();
        }

        function refreshPopupBody(){
            if(!popupNodeId) return;
            const node = currentWorkflow[popupNodeId];
            if(!node) return;
            const popup = document.getElementById('nodePopup');
            const body = popup.querySelector('.popup-body');
            if(!body) return;
            const inputs = Object.entries(node.inputs || {}).filter(([k,v]) => {
                return !(Array.isArray(v) && v.length === 2 && typeof v[0] === 'string' && typeof v[1] === 'number');
            });
            body.innerHTML = inputs.length === 0
                ? `<div class="popup-empty">${tr('comfy.noConfigFields')}</div>`
                : inputs.map(([key, value]) => renderInputRow(popupNodeId, key, value)).join('');
            refreshIcons();
        }

        function guessType(value, inputName){
            const lc = (inputName||'').toLowerCase();
            if(typeof value === 'boolean') return 'boolean';
            if(typeof value === 'number'){
                if(/strength|cfg|denoise/.test(lc)) return 'slider';
                return 'number';
            }
            if(typeof value === 'string'){
                if(/prompt|text|description/.test(lc) || (value && value.length > 60)) return 'textarea';
                if(/image|filename/.test(lc)) return 'image';
                return 'text';
            }
            return 'text';
        }

        function updateField(fieldId, key, value){
            const f = currentConfig.fields.find(x => x.id === fieldId);
            if(!f) return;
            f[key] = value;
            if(key === 'type'){
                previewValues[fieldId] = (value === 'boolean') ? false : (value === 'number' || value === 'slider' ? 0 : '');
            }
            // 改名字 / 类型时不需要整页重渲染，浮窗自身刷新即可
            if(key === 'name' || key === 'min' || key === 'max' || key === 'step' || key === 'default' || key === 'options'){
                renderPreview();
                return;
            }
            renderEditor();
            renderPreview();
            if(popupNodeId === f.node) refreshPopupBody();
        }

        function updateWorkflowTitle(value){
            if(!currentConfig) return;
            currentConfig.title = value;
            const item = workflows.find(w => w.name === selectedName);
            if(item) item.title = value || selectedName.replace('.json','');
            renderList();
        }

        function setWorkspaceMode(mode){
            workspaceMode = mode === 'canvas' ? 'canvas' : 'graph';
            document.getElementById('workspaceGraphTab')?.classList.toggle('active', workspaceMode === 'graph');
            document.getElementById('workspaceCanvasTab')?.classList.toggle('active', workspaceMode === 'canvas');
            renderWorkspaceView();
        }

        function renderEditor(){
            if(!currentWorkflow){
                deleteBtn.style.display = 'none';
                saveBtn.style.display = 'none';
                nodeListEl.innerHTML = '';
                document.getElementById('graphCard').style.display = 'none';
                document.getElementById('nodesToggle').style.display = 'none';
                if(miniCanvasHost) miniCanvasHost.style.display = 'none';
                return;
            }
            document.getElementById('nodesToggle').style.display = workspaceMode === 'graph' ? 'flex' : 'none';
            workflowTitleInput.value = currentConfig.title || selectedName.replace('.json','');
            subEl.textContent = tf('comfy.nodeStats', {nodes:Object.keys(currentWorkflow).length, fields:currentConfig.fields.length}) + (isBuiltin ? ` · ${tr('comfy.builtin')}` : '');
            deleteBtn.style.display = isBuiltin ? 'none' : 'inline-flex';
            saveBtn.style.display = 'inline-flex';

            renderGraph();
            renderWorkspaceView();

            const nodes = Object.entries(currentWorkflow).sort((a,b)=>{
                const aNum = parseInt(a[0],10), bNum = parseInt(b[0],10);
                if(!isNaN(aNum) && !isNaN(bNum)) return aNum - bNum;
                return a[0].localeCompare(b[0]);
            });

            nodeListEl.innerHTML = nodes.map(([nodeId, node])=>{
                const inputs = Object.entries(node.inputs || {}).filter(([k,v])=>{
                    return !(Array.isArray(v) && v.length === 2 && typeof v[0] === 'string' && typeof v[1] === 'number');
                });
                const exposedCount = inputs.filter(([k])=>fieldFor(nodeId,k)).length;
                const expanded = exposedCount > 0;
                const icon = nodeIcon(node);
                return `
                    <div class="node-card ${expanded?'expanded':''}" id="node-card-${escapeAttr(nodeId)}" data-node-id="${escapeAttr(nodeId)}">
                        <div class="node-card-head" onclick="this.parentElement.classList.toggle('expanded')">
                            <div style="display:flex;align-items:center;gap:12px;min-width:0;flex:1">
                                <span style="font-size:20px;line-height:1;flex:0 0 auto">${icon}</span>
                                <div style="min-width:0">
                                    <div class="node-class">${escapeHtml(nodeLabel(node))}</div>
                                    <div class="node-id">${escapeHtml(nodeSub(node))} · #${escapeHtml(nodeId)} · ${tf('comfy.configurableCount', {count:inputs.length})}</div>
                                </div>
                            </div>
                            <div style="display:flex;align-items:center;gap:10px;flex:0 0 auto">
                                <div class="node-stats">${exposedCount > 0 ? tf('comfy.exposedCount', {count:exposedCount}) : ''}</div>
                                <i data-lucide="chevron-down" class="w-4 h-4 node-chev"></i>
                            </div>
                        </div>
                        <div class="node-inputs">
                            ${inputs.map(([key, value])=>renderInputRow(nodeId, key, value)).join('') || `<div style="color:var(--faint);font-size:11px;text-align:center;padding:14px">${tr('comfy.noConfigInputs')}</div>`}
                        </div>
                    </div>
                `;
            }).join('');
            refreshIcons();
        }

        // 计算节点拓扑层级（按从入度 0 的源节点向下游传播）
        function computeLayers(){
            const ids = Object.keys(currentWorkflow);
            const incoming = {};   // nodeId -> Set of upstream nodeIds
            const outgoing = {};
            ids.forEach(id => { incoming[id] = new Set(); outgoing[id] = new Set(); });
            ids.forEach(id => {
                const inputs = currentWorkflow[id].inputs || {};
                Object.values(inputs).forEach(v => {
                    if(Array.isArray(v) && v.length === 2 && typeof v[0] === 'string'){
                        if(currentWorkflow[v[0]]){
                            incoming[id].add(v[0]);
                            outgoing[v[0]].add(id);
                        }
                    }
                });
            });
            const layer = {};
            const visited = new Set();
            function dfs(id, lv){
                if(visited.has(id)) return;
                if((layer[id] || 0) < lv) layer[id] = lv;
                else layer[id] = layer[id] || lv;
                visited.add(id);
                outgoing[id].forEach(child => dfs(child, lv + 1));
            }
            // 从无上游的节点开始
            ids.forEach(id => { if(incoming[id].size === 0) dfs(id, 0); });
            // 处理可能漏掉的环 / 孤立节点
            ids.forEach(id => { if(!(id in layer)) layer[id] = 0; });
            // 按层级分桶
            const buckets = {};
            ids.forEach(id => {
                const lv = layer[id];
                (buckets[lv] = buckets[lv] || []).push(id);
            });
            return { layer, buckets, incoming };
        }

        function renderGraph(){
            const svg = document.getElementById('graphSvg');
            if(!currentWorkflow || !Object.keys(currentWorkflow).length){
                document.getElementById('graphCard').style.display = 'none';
                return;
            }
            document.getElementById('graphCard').style.display = 'block';
            const { layer, buckets, incoming } = computeLayers();
            const NODE_W = 130, NODE_H = 50, X_GAP = 36, Y_GAP = 14;
            const positions = {};
            const sortedLevels = Object.keys(buckets).map(Number).sort((a,b)=>a-b);
            let maxRows = 0;
            sortedLevels.forEach(lv => {
                const ids = buckets[lv].sort((a,b)=>parseInt(a,10)-parseInt(b,10));
                ids.forEach((id, idx) => {
                    positions[id] = { x: lv * (NODE_W + X_GAP) + 16, y: idx * (NODE_H + Y_GAP) + 16 };
                });
                maxRows = Math.max(maxRows, ids.length);
            });
            const totalW = (sortedLevels.length) * (NODE_W + X_GAP) + 16;
            const totalH = maxRows * (NODE_H + Y_GAP) + 16;

            // 连线
            const edgesHtml = [];
            Object.keys(currentWorkflow).forEach(toId => {
                const inputs = currentWorkflow[toId].inputs || {};
                const seen = new Set();
                Object.values(inputs).forEach(v => {
                    if(Array.isArray(v) && v.length === 2 && typeof v[0] === 'string' && positions[v[0]]){
                        if(seen.has(v[0])) return;
                        seen.add(v[0]);
                        const from = positions[v[0]];
                        const to = positions[toId];
                        const x1 = from.x + NODE_W, y1 = from.y + NODE_H/2;
                        const x2 = to.x, y2 = to.y + NODE_H/2;
                        const cx = (x1 + x2) / 2;
                        edgesHtml.push(`<path class="gedge" d="M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}"></path>`);
                    }
                });
            });

            // 节点
            const nodesHtml = Object.entries(currentWorkflow).map(([id, node]) => {
                const pos = positions[id];
                const label = nodeLabel(node);
                const sub = node.class_type || '';
                const exposedCount = currentConfig.fields.filter(f => f.node === id).length;
                const exposedClass = exposedCount > 0 ? 'has-exposed' : '';
                const cat = NODE_INFO[node.class_type]?.cat || 'misc';
                const icon = nodeIcon(node);
                const truncLabel = label.length > 12 ? label.slice(0,12) + '…' : label;
                const truncSub = sub.length > 16 ? sub.slice(0,16) + '…' : sub;
                return `
                    <g class="gnode cat-${cat} ${exposedClass}" data-node-id="${escapeAttr(id)}" transform="translate(${pos.x},${pos.y})" onclick="openNodePopup('${escapeAttr(id)}', this)">
                        <rect width="${NODE_W}" height="${NODE_H}" rx="8"></rect>
                        <text class="gn-icon" x="10" y="20" font-size="14">${icon}</text>
                        <text class="gn-title" x="28" y="20">${escapeHtml(truncLabel)}</text>
                        <text class="gn-sub" x="28" y="35">${escapeHtml(truncSub)}</text>
                        <text class="gn-sub" x="${NODE_W - 8}" y="20" text-anchor="end">#${escapeHtml(id)}</text>
                        ${exposedCount > 0 ? `<text class="gbadge" x="${NODE_W - 8}" y="42" text-anchor="end">${tf('comfy.usedCount', {count:exposedCount})}</text>` : ''}
                    </g>
                `;
            }).join('');

            graphContentSize = { w: totalW, h: totalH };
            svg.innerHTML = `<g id="graphViewport" transform="translate(${graphView.x},${graphView.y}) scale(${graphView.k})">${edgesHtml.join('')}${nodesHtml}</g>`;
            // 设置 SVG 自身尺寸（占满容器）
            const wrap = svg.parentElement;
            svg.setAttribute('viewBox', `0 0 ${wrap.clientWidth} ${wrap.clientHeight}`);
            attachPanZoom(svg, wrap);
            updateZoomPill();
        }

        // 缩放/平移状态
        let graphView = { k: 1, x: 0, y: 0 };
        let graphContentSize = { w: 0, h: 0 };
        let panState = null;

        function updateZoomPill(){
            const pill = document.getElementById('zoomPill');
            if(pill) pill.textContent = Math.round(graphView.k * 100) + '%';
        }
        function applyGraphTransform(){
            const vp = document.getElementById('graphViewport');
            if(vp) vp.setAttribute('transform', `translate(${graphView.x},${graphView.y}) scale(${graphView.k})`);
            updateZoomPill();
        }
        function graphZoom(dir){
            const factor = dir > 0 ? 1.2 : 1/1.2;
            const newK = Math.max(0.2, Math.min(3, graphView.k * factor));
            // 围绕容器中心缩放
            const wrap = document.querySelector('.graph-svg-wrap');
            const cx = wrap.clientWidth / 2;
            const cy = wrap.clientHeight / 2;
            graphView.x = cx - (cx - graphView.x) * (newK / graphView.k);
            graphView.y = cy - (cy - graphView.y) * (newK / graphView.k);
            graphView.k = newK;
            applyGraphTransform();
        }
        function graphFit(){
            const wrap = document.querySelector('.graph-svg-wrap');
            if(!graphContentSize.w || !wrap) return;
            const pad = 20;
            const kx = (wrap.clientWidth - pad*2) / graphContentSize.w;
            const ky = (wrap.clientHeight - pad*2) / graphContentSize.h;
            const k = Math.max(0.2, Math.min(2, Math.min(kx, ky)));
            graphView.k = k;
            graphView.x = (wrap.clientWidth - graphContentSize.w * k) / 2;
            graphView.y = (wrap.clientHeight - graphContentSize.h * k) / 2;
            applyGraphTransform();
        }
        function attachPanZoom(svg, wrap){
            if(svg.dataset.panZoomBound) return;
            svg.dataset.panZoomBound = '1';
            // 滚轮缩放（围绕鼠标位置）
            wrap.addEventListener('wheel', e => {
                if(e.target.closest('.popup-panel')) return;
                e.preventDefault();
                const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
                const newK = Math.max(0.2, Math.min(3, graphView.k * factor));
                const rect = wrap.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                graphView.x = mx - (mx - graphView.x) * (newK / graphView.k);
                graphView.y = my - (my - graphView.y) * (newK / graphView.k);
                graphView.k = newK;
                applyGraphTransform();
            }, { passive: false });
            // 鼠标拖动（空白区域）
            svg.addEventListener('mousedown', e => {
                // 只在点击空白处（不是节点 g）才平移
                if(e.target.closest('.gnode')) return;
                e.preventDefault();
                panState = { sx: e.clientX, sy: e.clientY, ox: graphView.x, oy: graphView.y };
                wrap.classList.add('is-panning');
            });
            window.addEventListener('mousemove', e => {
                if(!panState) return;
                graphView.x = panState.ox + (e.clientX - panState.sx);
                graphView.y = panState.oy + (e.clientY - panState.sy);
                applyGraphTransform();
            });
            window.addEventListener('mouseup', () => {
                if(panState){ panState = null; wrap.classList.remove('is-panning'); }
            });
        }

        let popupNodeId = null;

        function openNodePopup(nodeId, gEl){
            popupNodeId = nodeId;
            document.querySelectorAll('.gnode').forEach(g => g.classList.toggle('is-active', g.dataset.nodeId === nodeId));
            const node = currentWorkflow[nodeId];
            if(!node) return;
            const popup = document.getElementById('nodePopup');
            const backdrop = document.getElementById('popupBackdrop');
            const inputs = Object.entries(node.inputs || {}).filter(([k,v]) => {
                return !(Array.isArray(v) && v.length === 2 && typeof v[0] === 'string' && typeof v[1] === 'number');
            });
            const icon = nodeIcon(node);
            const label = nodeLabel(node);
            const sub = nodeSub(node);
            popup.innerHTML = `
                <div class="popup-head">
                    <span class="popup-icon">${icon}</span>
                    <div style="min-width:0;flex:1">
                        <div class="popup-title">${escapeHtml(label)}</div>
                        <div class="popup-sub">${escapeHtml(sub)} · #${escapeHtml(nodeId)}</div>
                    </div>
                    <div class="popup-close" onclick="closeNodePopup()"><i data-lucide="x" class="w-4 h-4"></i></div>
                </div>
                <div class="popup-body">
                    ${inputs.length === 0
                        ? `<div class="popup-empty">${tr('comfy.noConfigFields')}</div>`
                        : inputs.map(([key, value]) => renderInputRow(nodeId, key, value)).join('')}
                </div>
            `;
            // 定位：尽量贴在节点右侧；若超出则放左侧；若上下放不下则居中
            const wrap = document.querySelector('.graph-svg-wrap');
            const wrapRect = wrap.getBoundingClientRect();
            const gRect = gEl.getBoundingClientRect();
            const POP_W = 380;
            const POP_H_MAX = Math.min(wrap.clientHeight - 40, window.innerHeight * 0.7);
            backdrop.style.display = 'block';
            popup.style.display = 'flex';
            popup.style.maxHeight = POP_H_MAX + 'px';
            // 相对 wrap 的坐标（含滚动）
            let left = gRect.right - wrapRect.left + wrap.scrollLeft + 12;
            // 不够位置就放左侧
            if(left + POP_W > wrap.scrollLeft + wrap.clientWidth - 8){
                left = gRect.left - wrapRect.left + wrap.scrollLeft - POP_W - 12;
            }
            if(left < wrap.scrollLeft + 8) left = wrap.scrollLeft + 8;
            let top = gRect.top - wrapRect.top + wrap.scrollTop;
            // 防止溢出底部
            const maxTop = wrap.scrollTop + wrap.clientHeight - POP_H_MAX - 8;
            if(top > maxTop) top = Math.max(wrap.scrollTop + 8, maxTop);
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';
            popup.onwheel = e => e.stopPropagation();
            popup.querySelector('.popup-body')?.addEventListener('wheel', e => e.stopPropagation(), { passive:true });
            refreshIcons();
        }

        function closeNodePopup(){
            popupNodeId = null;
            document.querySelectorAll('.gnode').forEach(g => g.classList.remove('is-active'));
            document.getElementById('nodePopup').style.display = 'none';
            document.getElementById('popupBackdrop').style.display = 'none';
        }

        function toggleNodeList(){
            const list = document.getElementById('nodeList');
            const txt = document.getElementById('nodesToggleText');
            const hidden = list.classList.toggle('hidden');
            txt.textContent = hidden ? tr('comfy.showNodeList') : tr('comfy.hideNodeList');
        }

        // Esc 关闭浮窗
        document.addEventListener('keydown', e => {
            if(e.key === 'Escape' && popupNodeId) closeNodePopup();
            if(e.key === 'Escape') closeImagePreview();
        });

        function renderInputRow(nodeId, inputKey, rawValue){
            const f = fieldFor(nodeId, inputKey);
            const active = !!f;
            const showExtras = active && (f.type === 'slider' || f.type === 'number' || f.type === 'dropdown');
            // 原始值类型徽章
            let valueBadge = '';
            const typeOf = typeof rawValue;
            if(typeOf === 'string'){
                const preview = rawValue.length > 50 ? rawValue.slice(0,50) + '…' : rawValue;
                valueBadge = `<span style="color:var(--muted);font-size:10.5px;font-weight:700">"</span><span style="color:var(--text);font-size:11px;font-weight:700">${escapeHtml(preview)}</span><span style="color:var(--muted);font-size:10.5px;font-weight:700">"</span>`;
            } else if(typeOf === 'number'){
                valueBadge = `<span style="color:#0369a1;font-size:11px;font-weight:800;font-variant-numeric:tabular-nums">${rawValue}</span>`;
            } else if(typeOf === 'boolean'){
                valueBadge = `<span style="color:${rawValue?'#15803d':'#b45309'};font-size:11px;font-weight:800">${rawValue?'✓ true':'✗ false'}</span>`;
            } else {
                valueBadge = `<span style="color:var(--faint);font-size:11px">${escapeHtml(String(rawValue))}</span>`;
            }
            const friendlyName = inputLabel(inputKey);
            const showOriginal = friendlyName !== inputKey;
            return `
                <div class="input-row ${active?'is-active':''} ${showExtras?'has-extras':''}">
                    <div class="check-toggle ${active?'checked':''}" onclick="toggleField('${escapeAttr(nodeId)}','${escapeAttr(inputKey)}')">
                        ${active ? '<i data-lucide="check" class="w-3 h-3"></i>' : ''}
                    </div>
                    <div class="input-info">
                        <div class="input-key">${escapeHtml(friendlyName)}${showOriginal ? ` <span style="font-size:10px;font-weight:600;color:var(--faint);margin-left:4px">${escapeHtml(inputKey)}</span>` : ''}</div>
                        <div class="input-orig">${tr('comfy.defaultValue')}${valueBadge}</div>
                    </div>
                    <input class="small-input" type="text" placeholder="${tr('comfy.displayName')}" value="${active?escapeAttr(f.name):escapeAttr(friendlyName)}" ${active?'':'disabled'} oninput="updateField('${active?f.id:''}','name',this.value)">
                    <select class="small-select" ${active?'':'disabled'} onchange="updateField('${active?f.id:''}','type',this.value)">
                        ${TYPES.map(t=>`<option value="${t.v}" ${active && f.type===t.v?'selected':''}>${typeLabel(t.v)}</option>`).join('')}
                    </select>
                    ${active ? renderExtras(f) : ''}
                </div>
            `;
        }

        function renderExtras(f){
            if(f.type === 'slider' || f.type === 'number'){
                return `<div class="extras-row">
                    <div class="extra-pair">min<input class="small-input" type="number" value="${f.min ?? ''}" oninput="updateField('${f.id}','min',this.value===''?null:parseFloat(this.value))"></div>
                    <div class="extra-pair">max<input class="small-input" type="number" value="${f.max ?? ''}" oninput="updateField('${f.id}','max',this.value===''?null:parseFloat(this.value))"></div>
                    <div class="extra-pair">step<input class="small-input" type="number" value="${f.step ?? ''}" oninput="updateField('${f.id}','step',this.value===''?null:parseFloat(this.value))"></div>
                    <div class="extra-pair">${tr('comfy.defaultValue')}<input class="small-input" type="number" value="${f.default ?? ''}" oninput="updateField('${f.id}','default',this.value===''?null:parseFloat(this.value))"></div>
                </div>`;
            }
            if(f.type === 'dropdown'){
                const opts = f.options || [];
                const fid = escapeAttr(f.id);
                const rows = opts.map((o, i) => {
                    const looksNumber = String(o).trim() !== '' && !isNaN(Number(o));
                    const tag = looksNumber
                        ? '<span class="opt-type-tag is-num">数字</span>'
                        : '<span class="opt-type-tag">文本</span>';
                    return `
                        <div class="dropdown-opt-row">
                            <span class="opt-index">${i + 1}</span>
                            <input class="small-input" type="text" placeholder="选项 ${i + 1}" value="${escapeAttr(o)}"
                                onmousedown="event.stopPropagation()" onclick="event.stopPropagation()"
                                oninput="updateDropdownOption('${fid}', ${i}, this.value, this)">
                            ${tag}
                            <button class="opt-del" type="button" onclick="event.stopPropagation();removeDropdownOption('${fid}', ${i})" title="删除"><i data-lucide="x" class="w-3 h-3"></i></button>
                        </div>
                    `;
                }).join('');
                return `<div class="extras-row" style="flex-direction:column;align-items:stretch;gap:6px">
                    <div style="font-size:11px;color:var(--muted);font-weight:700">
                        下拉选项 <span style="color:var(--faint)">· 数字形式自动作为数值传给 ComfyUI</span>
                    </div>
                    ${rows}
                    <button class="ghost-btn" type="button" onclick="event.stopPropagation();addDropdownOption('${fid}')" style="height:34px;padding:0 16px;font-size:12px;font-weight:800;align-self:flex-start;gap:6px"><i data-lucide="plus" class="w-3.5 h-3.5"></i><span>添加选项</span></button>
                </div>`;
            }
            return '';
        }
        function updateDropdownOption(fieldId, index, value, inputEl){
            const f = currentConfig.fields.find(x => x.id === fieldId); if(!f) return;
            f.options = f.options || [];
            f.options[index] = value;
            // 不重渲浮窗，只更新当前行右侧「数字/文本」标签
            if(inputEl){
                const tag = inputEl.parentElement?.querySelector('.opt-type-tag');
                if(tag){
                    const looksNumber = String(value).trim() !== '' && !isNaN(Number(value));
                    tag.classList.toggle('is-num', looksNumber);
                    tag.textContent = looksNumber ? '数字' : '文本';
                }
            }
            renderPreview();  // 右侧预览的下拉选项实时同步
        }
        function addDropdownOption(fieldId){
            const f = currentConfig.fields.find(x => x.id === fieldId); if(!f) return;
            f.options = [...(f.options || []), ''];
            renderPreview();
            if(popupNodeId === f.node) refreshPopupBody();
        }
        function removeDropdownOption(fieldId, index){
            const f = currentConfig.fields.find(x => x.id === fieldId); if(!f) return;
            f.options = (f.options || []).filter((_, i) => i !== index);
            renderPreview();
            if(popupNodeId === f.node) refreshPopupBody();
        }

        // --- 右侧实时预览 ---
        function setPreviewValue(fieldId, value){
            previewValues[fieldId] = value;

        function renderPreview(){
            if(!currentConfig || !currentConfig.fields.length){
                previewCard.innerHTML = `<div class="preview-empty">${tr('comfy.previewEmpty')}</div>`;
                return;
            }
            const fieldsHtml = currentConfig.fields.map(f => renderPreviewField(f)).join('');

        function renderPreviewField(f){
            const label = `<div class="pfield-label">${escapeHtml(f.name || f.input)}</div>`;
            const v = previewValues[f.id] ?? f.default ?? (f.type==='boolean'?false:(f.type==='number'||f.type==='slider'?0:''));
            if(f.type === 'textarea'){
                return `<div class="pfield">${label}<textarea class="pfield-textarea" oninput="setPreviewValue('${f.id}',this.value)">${escapeHtml(v)}</textarea></div>`;
            }
            if(f.type === 'number'){
                return `<div class="pfield">${label}<input class="pfield-input" type="number" value="${escapeAttr(v)}" oninput="setPreviewValue('${f.id}',parseFloat(this.value)||0)"></div>`;
            }
            if(f.type === 'slider'){
                const min = f.min ?? 0, max = f.max ?? 10, step = f.step ?? 1;
                return `<div class="pfield">${label}<div class="pfield-slider">
                    <input type="range" min="${min}" max="${max}" step="${step}" value="${escapeAttr(v)}" oninput="setPreviewValue('${f.id}',parseFloat(this.value))">
                    <span class="pfield-slider-val" data-slider-val="${f.id}">${v}</span>
                </div></div>`;
            }
            if(f.type === 'dropdown'){
                const opts = (f.options || []).map(o => `<option value="${escapeAttr(o)}" ${String(v)===String(o)?'selected':''}>${escapeHtml(o)}</option>`).join('');
                return `<div class="pfield">${label}<select class="pfield-select" onchange="setPreviewValue('${f.id}',this.value)">${opts || `<option value="">${tr('comfy.noOptions')}</option>`}</select></div>`;
            }
            if(f.type === 'image'){
                // 浏览器显示用本地 blob URL；如果没有就尝试用 /output/ 之类的可访问 URL；都没有显示占位文字
                const displayUrl = previewImageUrls[f.id] || (typeof v === 'string' && /^(\/|https?:|blob:|data:)/.test(v) ? v : '');
                return `<div class="pfield">${label}<div class="pfield-image-drop ${displayUrl?'has-image':''}" onclick="pickImage('${f.id}')">
                    ${displayUrl ? `<img src="${escapeAttr(displayUrl)}">` : tr('comfy.clickUploadImage')}
                </div></div>`;
            }
            if(f.type === 'boolean'){
                return `<div class="pfield">${label}<div class="pfield-bool">
                    <div class="pfield-bool-track ${v?'on':''}" onclick="setPreviewValue('${f.id}',!${!!v});this.classList.toggle('on')">

                    </div>
                </div></div>`;
            }
            return `<div class="pfield">${label}<input class="pfield-input" type="text" value="${escapeAttr(v)}" oninput="setPreviewValue('${f.id}',this.value)"></div>`;
        }

        function miniCardStyle(key){

        function miniLine(aKey, bKey){

                                <button id="runBtn" class="run-btn mini-run" type="button" onclick="onRun()">

        function renderMiniField(f){
            const label = `<div class="pfield-label">${escapeHtml(f.name || f.input)}</div>`;
            const v = previewValues[f.id] ?? f.default ?? (f.type==='boolean'?false:(f.type==='number'||f.type==='slider'?0:''));
            if(f.type === 'image'){
